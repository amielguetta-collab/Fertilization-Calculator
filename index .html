<!DOCTYPE html><html lang="he" dir="rtl"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>הכלי החקלאי — פנורה סידס</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@700;900&family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:#f7f6f2;font-family:Heebo,system-ui,sans-serif;display:flex;flex-direction:column;overflow:hidden}
/* gate */
#gate{position:fixed;inset:0;background:#1f4a3f;z-index:100;display:flex;align-items:center;justify-content:center;padding:24px}
#gate.out{opacity:0;pointer-events:none;transition:opacity .4s}
.gc{width:100%;max-width:340px;text-align:center;color:#fff}
.gc img{max-height:44px;margin-bottom:14px}
.gc .pn{font:700 11px Heebo;letter-spacing:2px;color:#a9c6bb;margin-bottom:4px}
.gc h1{font:900 26px/1.15 'Frank Ruhl Libre',serif;margin-bottom:6px}
.gc p{color:#a9c6bb;font-size:13px;margin-bottom:22px}
#code{width:100%;padding:14px;border:1.5px solid #3d6b5c;border-radius:11px;background:#183d33;color:#fff;font:700 20px Heebo;text-align:center;letter-spacing:3px;text-transform:uppercase;outline:none}
#code::placeholder{letter-spacing:normal;font-weight:400;color:#6f9184}
#code:focus{border-color:#7fd4b8}
#go{width:100%;margin-top:10px;padding:14px;border:0;border-radius:11px;background:#fff;color:#1f4a3f;font:700 16px Heebo;cursor:pointer}
#go:disabled{opacity:.6}
#ge{color:#ffc9c9;font-size:13px;height:20px;margin-top:10px}
.hint{font-size:11px;color:#6f9184;margin-top:14px}
/* shell */
header{background:#1f4a3f;color:#fff;padding:11px 14px 0;flex:none}
.brand{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px}
.brand b{font:900 19px 'Frank Ruhl Libre',serif}
.brand span{font:400 11.5px Heebo;color:#a9c6bb}
#lang{background:rgba(255,255,255,.15);color:#fff;border:0;border-radius:7px;padding:6px 12px;font:600 13px Heebo;cursor:pointer}
.tabs{display:flex;gap:2px}
.tabs button{flex:1;padding:12px 6px 13px;background:transparent;border:0;color:#a9c6bb;font:500 15px Heebo;cursor:pointer;border-bottom:3px solid transparent}
.tabs button b{display:block;font-weight:700;font-size:15px}
.tabs button small{font-size:10.5px;opacity:.75}
.tabs button[aria-selected=true]{color:#fff;border-bottom-color:#7fd4b8}
main{flex:1;position:relative}
iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:none;background:#f7f6f2}
iframe.active{display:block}
</style>
</head><body>

<div id="gate"><div class="gc">
  <img src="logo.png" alt="Panora" onerror="this.style.display='none'">
  <div class="pn">PANORA SEEDS</div>
  <h1 id="gTitle">הכלי החקלאי</h1>
  <p id="gSub">כניסה למגדלים · הזן את קוד הגישה</p>
  <input id="code" type="text" placeholder="קוד גישה" autocomplete="off" inputmode="text">
  <button id="go">כניסה →</button>
  <div id="ge"></div>
  <div class="hint" id="gHint">קיבלת את הקוד מנציג פנורה</div>
</div></div>

<header>
  <div class="brand"><span style="display:flex;gap:10px;align-items:baseline"><b id="bTitle">הכלי החקלאי</b><span id="bSub">פנורה סידס</span></span>
  <button id="lang">EN</button></div>
  <nav class="tabs" id="tabs">
    <button data-k="fert" aria-selected="true"><b>דישון</b><small>מחשבון הזנה</small></button>
    <button data-k="hagana"><b>הגנת הצומח</b><small>תכשירים ו-IPM</small></button>
    <button data-k="seed"><b>שתילים</b><small>צפיפות לדונם</small></button>
  </nav>
</header>
<main id="main"></main>
