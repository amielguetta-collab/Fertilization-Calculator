 יש לבצע שילובים רק בהתאם להנחיות התוויות ורק בגידולים המפורטים כאן:\n- בתפו\"ח ניתן לשלב עם מנציד, אודאון.\n- בדקל קנרי, ניתן לשלב קוהינור 0.2% עם קרטה מקס 0.3%.","c":"high"},"1639":{"t":"שילובים: קוויק ניתן לשלב עם אולטרה לשילוק הראשון, הריסום הראשון יעשה מהאולטרה בלבד.\nאסור לשלב עם מג או עם חומרים המכילים כלורינים.","c":"high"},"1957":{"t":"שילובים: אין לשלב קוז'אק בתכשירים נוספים.","c":"high"},"4152":{"t":"שילובים: ניתן לשלב עם אטופס, דופלוזן KV, אקספרס.","c":"high"},"964":{"t":"שילובים: אין לשלב קולטר עם תכשירי הדברה אחרים (למעט משטח L-77 ושטח 90).","c":"high"},"1938":{"t":"שילובים:\nבתפוח - ניתן לשלב קוליס עם נאנובצ' ת\"נ ועם אבצאון ת\"נ.\nבגפן - ניתן לשלב קוליס עם אוונט, ראנר.","c":"high"},"1918":{"t":"שילובים:\nניתן לשלב קומודור עם התכשירים הבאים, בהתאם למינונים וההנחיות המופיעות בתוויות הארוזה שלהם:\nתפו\"א - טלסטאר.\nגזר - אטברון.\nחימצה - קנון 50, טלסטאר, פנטרה, דואל גולד.\nאבטיח - וורטימק.\nמלון - דומארק (בריסוס בלבד).\nמלפפון - סוויץ'.\nאגוזי אדמה - טלסטאר.","c":"high"},"1077":{"t":"שילובים אסורים: אין לערבב עם שמנים. אין לערבב עם תכשירים כלורפיריפוס (דורסן, דורסבן, דורפס, דוראון).","c":"high"},"7181":{"t":"שילובים אסורים: אין לערבב עם שמנים. אין לערבב עם תכשירים כלורפיריפוס (דורסן, דורסבן, דורפס, דוראון).","c":"high"},"1792":{"t":"שילובים: ניתן לשלב את התכשיר עם פוליקור 250 תמ. בתפוחי אדמה. בגידולים או בזנים מסויימים עלולים שילובים שונים לגרום לנזק לפנייה. לפני ריסוס משקי של שילוב שטרם נוסה, רצוי לוודא את התחלתו בקנה מידה מצומצם. על כל פנים, אין לערבב אחרי מניית התכשירים.\nניקוי המרסס: בגמר הריסוס יש לרוקן את המיכל. מחשארות ההתאם להנחיות לניקוי תכשיסים. אחר כך יש לשטוף את המרסס וכל חלקיו בגינים ודורנות. את התשטיפים יש לשלוק בהתאם להנחיות לסיילוק תשסיפים.\nסילוק תשסיפים: אין לרוקן ולשפוך תשסיפים או שאריות ממתקן ריסוס. ממיכל ריסוי או ממתקן הקרקע. אל בריכות דגים ואל מקורות ומקוי מים לאדמה לצורך לסלוק תשסיפים מאושרות על ידי הרשות לגהות הסביבה, כגון: ריסוס בשטח קלאי, שימוש חוזר, סינוי ופינוי לאתר המוסלם הרעילה בזמת חובב.\nהגנה אישית: עם גמר הטיפול, יש לרחוץ היטב את הפנה בפרט את החלקים שהיו עלולים בעת הריסוס ולהחליף בגדים. יש לכבס את בגדי העבודה בנפרד ולנקות את צוד (מגן) בצורה טרנוגנת.\nכניסה מחדש לשטח: אפשר לכנס לשטח/גידול המטופל לאחר תייבשות המולחלות של התרסיס. בבתי זגוחיה ובמנהרות יש לאוורר 12 שעות","c":"high"},"1855":{"t":"שילובים: בהעדר מידע נוסף, אין לשלב את התכשיר עם תכשירים אחרים.","c":"high"},"1873":{"t":"שילובים: בהעדר מידע נוסף, אין לשלב את התכשיר עם תכשירים אחרים.","c":"high"},"4498":{"t":"שילובים: אין לשלב קונרי עם תכשירי הדברה אחרים.\nיש לשמור על מרחק ביטחון של 30 מטר מגידול קיים.","c":"high"},"7581":{"t":"שילובים: קוסאוות משתלב עם מרבית תכשירי ההדברה המקובלים בשימוש. בהתחשב במינון, בתכשירים והתוצאות, בתנאי אקלים משתנים, במינון זנים ושיטות גידול, על המגדל לבצע בדיקת שילובים מקדימה בקנה מידה קטן לפני יישום משקי נרחב. בכל מקרה של","c":"high"},"4358":{"t":"שילובים: אין לשלב קוסטאר בתכשירים אחרים.","c":"high"},"7494":{"t":"שילובים: אין לשלב קוסטאר בתכשירים אחרים.","c":"high"},"1888":{"t":"שילובים: ניתן לשלב קוסמוס עם התכשירים הבאים, בהתאם למינונים המופיעים בתוויות הארזיה שלהם: במלון: טלסטאר, דומארק, איינפונטן, אמפליגו, ארמדה, אתלט, גלבן מנקוזב, ויטון, קאסטור. בתפוח אדמה: איינפונטו, אורטיבה טוב, גליס, ניתן, גלבן מנקוזב, ויטון, זורבק אנקנציה, מנקור, סיגנום, ספינקס, קבריו, רידומיל גולד. בחמצה ואפונה: טלסטאר.","c":"high"},"1623":{"t":"שילובים:\nבהעדר מידע נוסף אין לשלב תכשיר זה עם תכשירים אחרים.","c":"high"},"4460":{"t":"שילובים מותרים: חברת אגרולב לא ביצעה ניסויי שילובים של תכשיר קופרסייד עם תכשירים אחרים.\nשילוב התכשיר עם תכשירים אחרים הינו באחריות החקלאי בלבד.\nשילובים מותר לדרוק על פי גיזול של פני שטח ריחב.\nכאשר משלבים תכשיר נוסף יש להוסיף למיכל המרסס קודם לאחר הכנסתו ערבוב של קופרסייד 40.\nבחקלאות אורגנית מותר לשלב עם ארק ועם תכשירים המאושרים לחקלאות אורגנית.","c":"high"},"7491":{"t":"שילובים מותרים: חברת אגרולב לא ביצעה ניסויי שילובים של תכשיר קופרסייד עם תכשירים אחרים.\nשילוב התכשיר עם תכשירים אחרים הינו באחריות החקלאי בלבד.\nשילובים מותר לדרוש על פי כל גניזול לפני שימוש מסחרי נרחב.\nכאשר משלבים תכשיר נו ר סופר.\nניתן לשלב עם מוּנעי הצצה (כגון דיאורקס, גליגן). לפעולת דיאורקס דרוש גשם או המטרה תוך 3-2 שבועות לאחר הריסוס, לגליגן תוך 7-14 ימים בהתאם לעונה.\nבכל השילובים יש לנהוג לפי התוויות של התכשירים לגבי הגידולים המורשים – אמצעי הזהירות וניקוי המרסס.","c":"high"},"1734":{"t":"שילובים: להדברת מגוון רחב של עשבים קיימים, ניתן לשלב עם גליגן, טומהוק, אלבר סופר. ניתן לשלב עם מוצני הצצה (כגון דיאורקס, גליגן). להפעלת דיאורקס דרוש גשם או המסרה תוך 2-3 שבועות מיישום.","c":"high"},"1816":{"t":"שילובים: בגפן ניתן לשלב עם ראונד וסיפרון 20. במלון ניתן לשלב עם איפון. בענבייה ניתן לשלב עם ראונד, מייטקלין ואקסמייט. השילובים בהתאם לתוויות התכשירים המשולבים.","c":"high"},"1521":{"t":"שילובים: ניתן לשלב ראנר עם אינדר, קרטן סטאר בגפן ובתפוח, ועם התכשיר מיקרוטיול בתפוח במינונים ובמגבלות המופיעים בתוויות התכשירים המשולבים. בהעדר מידע אין לשלב ראנר עם תכשירים אחרים.","c":"high"},"7574":{"t":"שילובים: אין מידע.","c":"high"},"4046":{"t":"שילובים: בתפוח אדמה ניתן לשלב רבוס עם מץ', מוליט, סקור, במלון ובקישוא ניתן לשלב רבוס עם קוליס ואופיר.\nלגבי שילובים נוספים ראה בטבלת הוראות השימוש.","c":"high"},"686":{"t":"שילובים: אין לשלב עם תכשירים נוספים.","c":"high"},"1646":{"t":"שילובים מותרים: למניעת הצצה של חד שנתיים בהדרים ניתן לשלב עם ויאזגו 80 תר' במינון 250-300 מ\"ל/ד', השילוב המשולש עם ג'סט או אקורד 30 מ\"א, אולם אלה המחוברת במשך 12 שעות לאחר הריסוס כדי להגביר את קליטת הרונדומור בגוף הצמח.","c":"high"},"1386":{"t":"שילובים: בכל מקרה של שילוב יש לפעול עפ\"י הוראות השימוש של התכשיר המשולב, ורק בגידולים המפורטים כאן. אין לשלב עם חומרים נוספים. למניעת הצצה של חד-שנתיים בהדרים ניתן לשלב עם דיאורקס 80 ת.ר. עפ\"י המינון המומלץ בתוויות התכשיר עם דיאורקס. יש להימנע מהמרסס במשך 12 שעות לאחר הריסוס כדי להבטיח את קליטת הרונדופז בנוף העלים.","c":"high"},"389":{"t":"שילובים: במטעים של עצי פרי ובעצי נוי ניתן לשלב בסטה בטיפול מכוון מתחת לנוף, אך בשום אופן לא כאשר יש חשש להגעת רחף התרסיס לעלווה או לחלקים הירוקים של הגידול המטופל. בהדרים ניתן לשלב עם בסטה בסטה או עם אורגן בטיפול מכוון מתחת לנוף.","c":"high"},"14 ם, ראבאון 200 מל'/ד/דונם, קוון 100 גרם/דונם או אתלס 50 מל'/ד/דונם.\nשילובים במלון: וגם (ורכס) ניתן לשלב אינפיניטו (150 מל'/ד/דונם) עם כל אחד מהתרסיסים הבאים - אוברון 240 ת.ר. (60 מל'/ד/דונם), קליפסו (40 ת.ר. 480 מל'/ד/דונם).","c":"low"},"1794":{"t":"שילובים:\nבכותנה ניתן לשלב עם אלפורד ת\"מ, מולטי ת\"מ, ואטברון ת\"מ. בגזר ניתן לשלב עם דורסאן, פוקסים ת\"מ, סימבוש ת\"מ. בתפוח ניתן לשלב עם מולטי ת\"מ. בדואלי ניתן למזג בוגירון עם מולטי. בתפוחים ניתן למזג בוגירון עם מולטי. בתהליך הגבינה ניתן לשלב עם אוריגו-אנוסס. רסס בוגירון עם אוריגו בצלון. יפחית גם את הגניעות החלזון.\nבבית הגרעינים, שטומי, אורורנו, מנטה, רוזמרין, קורנית, בזיל, טורגון, סלרי גלים — ניתן לשלב.\nבגפן ניתן לשלב עם [לא ברור].\nבוגירון ניתן בכל מגע לטיפול מלנגרון עם הצהרוניות נוספת אחרת. עם הכשירים מקבוצה אחרת. עם הצמחים מנחה ורסס פנם בשבוע. בגניעות קצות ומאוחרות רסס פעמים עד כל הטיפוליים עד כלי פעמים — זצוף את הטיפוליים עד כלי פעמים — רסס שתי הפסקות לאחר השסקריה.\nהמינון הגבוה לריסוס בגנים ניתן לטיפול למחלה כמו אלפא ניקולה, ארניה, רוזול, ראסט-בורנברג וקוסמוס.\nריסוס נגד מטמפילוס יפחית גם את הגניעות החלזון.","c":"low"},"4501":{"t":"שילובים: בהעדר מידע אין לשלב את התכשיר עם תכשירים נוספים.","c":"low"},"1995":{"t":"כללי: גולטיקס מיול גו מתוצ הצגה גו מגדיר עצמים קיימים. העסקים המהודרים: מ קי-אות. שקל-אגרור. מלקים. מכיכים. בודקים.\nהמוצר מציג:\n1. הודעו ייצול ייצ-ל-ביאומה הגבוה. מה שייצלים שייצלים מהמדיסים\n2. לידים נוך לתחפות בנפט ביקים ולא לידים (ולא בתאים מסוי)\nורד אן יחידי לפי הדיוקן. אוחלים בנחמה על בל מסוי רסים\nמהעין בפיאות מוצג. אם אן יתה שימות קפנת ביזוות שנמצאה\n[לא ברור] של שוחמים קרי-ומרים לא ריים בגם הסחים\n3. אין לסום בנירכים בנירות בלא רוחות.\nהוראות שימוש:\nאחרים אחרי בנירות.\nאמציות הוראות מינינ:\nיש לשמר ולשמות אסחר בנחמה לגלילו בנהרות הסקבלים\nכחשאט במאפי הדרכי. יש לסקייר או בני שמחה. איציים. אציות מהגן\nסרל שעד לקימלים מה עלי שנה תערה אציב לציין לצאת נגד יד\nהשיטי. לשחמטת בגבנטים נגדי (לפי מם ב ג-ן לצוי איל-פחטים נגד מע\nאמצע. בתפנד לפני מהד (לפי מם 166-גיל) אך לאסר דרך השחמת\nמום (מם לצוי-צוי לפי מום מסאלם) תחני ולניים-לניים נאסר חוני 23 ABEK\nיש לסקים מגלינים ביחסי מחאכה ונגדי מום שיר מסוי בניות,\nבנאות ואוחד לציון גרנס (לרוי בגלים אד בנחמות הנחמות לחייב) לצי\nלחייב מגלינים לציון גנס גג בהחזל הגרמלו. לניים. מישות אלה יש\nלחייב מהנם ינה פום גם\nסיליקוס לכביר:\nרות גלינות פחי מחי על בל מחמה מסוי לנחמה.\nאמציות הוראות גנות הגרוס:\nאת לסום ביצוי יר. רות. שיוי רוד של הנחמות לנות הגרות לחייב\nשוטמות. ינות רוות עמד לחולנות. מגלי תנחמות. מהי. לחיים. מגלים בלנות.\nאשד גריפ שלקם בגום. ביוה. פנים שמאות אח גם מהנם ח-שה אוחד לפניות.\nבנות הגרוס:\n1. מחלות אח מחלי נסיות שח לחיות ביות.\n2. השחמות אח בנחמות ההולדות לח הסנה לחייב לחויו ובנחמות לחייב\nשלר מסוי הגרסים. מהסב הגרות אח אגנה ביחסי לצויו לציד ביציוות\nעד מסוי הגרסים. מהסב הגרות אח שיקי \"אנגי\" בל מהלות ביחסים ביות\nוה גל.\n3. יש להסיב הגנות לל הגרסות ביות בלנות לשחמות-ביות בנחמות מסיות\nיש לתקפי ביות ע-הל לוחמות-ביות לגנות לנחמות המחמות ביות ביות\nבנאפלה נחמות ביות הגרוב לחייב לנחמה בלחיות בנוי הגרוב ביות","c":"low"},"1787":{"t":"שילוב גליל עם גלי-פרים (ראהנדרא, גאלאן) [לא ברור - שאר הטקסט בסעיף זה אינו קריא בבירור ברזולוציה הנתונה]","c":"low"},"347":{"t":"הגנת התרסיס: מניעים בנכל המרסס את התכשיר המיועד לשילוב בטיבולין בהתאם להנחיות המופיעות בתוויות שלו. לאחר מכן מוסיפים את הכמות הדרושה של טיבולין ואת יתרת המים תוך כדי בחישה.","c":"low"},"4569":{"t":"שילובים: בתפות אין וחזיל נין (לשלב עם אקו-טק בריכוז 0.07%.","c":"low"},"4672":{"t":"שילובים: לתכשיר זה אין מידע על שילובים מותרים. בהעדר מידע נוסף אין לשלב תכשיר זה עם תכשירים אחרים.","c":"low"},"1337":{"t":"שילובים:\nבגידולים הבאים ניתן לשלב מיתוס עם התכשירים המפורטים להלן בכפוף לחוויות שלהם:\nבצל (זנים: מיקרו, אדום, אורלנד (686); מובנו 100.\nמלפפון: דיינון, אופיר, ורטימק.\nעגבניה: אופיר, סנסור, ורטימק.\nתות שדה: אופיר, [לא ברור], דורסן, סימבוש.\nגפן ([לא ברור]): דורסן, סימבוש.\nבהעדר מידע נוסף אין לשלב תכשיר זה עם תכשירים אחרים.","c":"low"},"1354":{"t":"שילובים: אין לשלב את מקסים עם תכשירים על בסיס נחושת. אין לשלב עם תכשירים אלקליים. אין לשלב עם שמנים. בהעדר מידע נוסף אין לשלב תכשיר זה עם תכשירים אחרים.","c":"low"},"488":{"t":"[לא ברור] — הטקסט של פרק 'שילובים' אינו קריא בבהירות מספקת מהתמונות שסופקו","c":"low"},"4614":{"t":"בנטר השימוש:\nניקוי ציוד האיוד: בגמר היישום יש לשטוף את מכשיר האיוד זכל הקרים בנים ובדטרגנט. את השטטיפים יש לסלק בתאם לתחיות לסילוק תכשירים.\nסילוק תשטיפים: אין לרוקן ולשטוף תכשירים או שאריות ממתתן איזד. המכל אסיוך אין מחוכין אחר אל ברכות דנים ואל מקורות ומקורי המים למינים. יש לסלק תשטיפים בשיטות מאושרות על ידי המשרד להגנת הסביבה, בגנון: שיחור, אידוי ופיני לאתר הפסולות הרעילה ברמת חובב. השטיפים הכמילים דטורגנטים יש לפנות לאתר הפסולות הרעילה בנואה בעבודה\nהגנה אישית בגמר העבודה: מיד בגמר העבודה עם התכשיר יש לחתקלק בנים ובסבון ולהחליף את כל הבגדים. בדי עבודה המזוהמים יש לכבס בנפרד מהשאר אל המנש מחדש בגדים שלא נכבסו.\nכניסה מחדש: אין להיכנס לחדר האחסון [לא ברור] 48 שעות לאחר היישום, מחשב לפציעה בציעילות הטיפול. לפני כניסה מחדש, יש לאוורר את חדר האחסון בטרח חצי שעה לפחות.\nאחסון: יש לאחסן את התכשיר סגור בארזיחות המקורית, במקום קריר, יבש, מוצל, מאורר, מוגן ומנועל המיועד לאחסון תכשיר בצורה הידורה. הרחק ממגע ים של ילדים ואנשים לא מוסמכים. הקפד לבל יבוא התכשיר במגע","c":"low"},"656":{"t":"סכנות לסביבה: סיפרין 10 עלול לייתר לדבורים-באוזרים ובצמחות דבש היה פעילות של דבורים חל איסור מוחלט לייש בשימוש זה , יש להימנע מהצבת רחף (דבורים) ועצבים פרחים סמוכים. ולגדים - עלול לגרום לנזק ארוך טווח לסביבה המימית . מנע זרימה וחרף לבריכות דגים ולמקורות מים.\nבהעדר מידע נוסף אין לשלב סיפרין 10 עם תכשירים אחרים.","c":"low"},"821":{"t":"3. טיפול רישום לשילובי מוצרים במגננו. [הטקסט בחלק זה אינו קריא בבירור מהתמונה]","c":"low"},"9049":{"t":"שילובים: בירקות ניתן לשלב עם ורטימק או מילבנוק לפי הרישיון לתכשיר עם סיגנום. בעגבניה ובפלפל ניתן לשלב עם אופיר עם סיגנום. במלפפון ועגבניה ניתן לשלב עם מסאי.","c":"low"},"1683":{"t":"שילובים: פלורמייט נבדק ונמצא בטוח בשילובים עם התכשירים הנאמן: BB-5. ציפורן: סיידר; סולידגו: אופיר, אואנץ, טריגרד; גיבסנית: חמנית; טריגרד; סייפן: טריגרד; חרצית: אואנץ; עגבניה: מינטוס, סקלון, פולאר, קלפומן, שביט, אואנץ, היפוקרטס, אפולו, מע', ספיידר, לפנוס 250; פלפל: ספיידר, פולאר, שביט, אואנץ, היפוקרטס, ורטלמקס, מטאמר, מע', ספיידר, פנוס 250; חציל: ספיידר; מלפפון: ספיידר, פנוס 250; אבטיח: ספיידר; תות: אפולו, דפנדה. עם זאת יש להתחשב בתנאים המינוחים באזורים השונים ובמיגוון בדיקות הגידול עם התכשירים המשתנים בקנה מידה כושר השתלבות ובטיחות המוקדמות מהקנה מידה.\nבגמר השימוש:\nניקוי ציוד הריסוס: בגמר הריסוס, יש לרוקן את המכל מהשאריות להחזות לסילוק הבטיחותי. את יש לשטוף את המרסס ב-[לא ברור] תחלילו במים במס' תפעולות ובדטרגנט, את התשטיפים יש לסלק בהתאם להנחיות תקשטיפים.\nסילוק תשטיפים: אין לרוקן ולשטוף תכשירים בתנאים","c":"low"},"4232":{"t":"שילובים: אין לשלב בתכשירים מלמים (נחושת) בגמר השימוש. אין לשלב בגנוב (תכשיר מלמים): לאחר גמר העבודה הוסף גנוב גגים ובגמר, אח גני ולאחר הכנה בכם בנמרו. להכין לשפות המסכמה מנץ עץ נמר הטפול בבנה איחה ונמרתה שריות של לארוד בנמסי 12 שגים לפי כניסה מחדשי אמנון: לאח השיפוש הנחד של הוראה אחת את החשריי באסיי החשרי: הגברה הגדיה המחלק ביה אם חי מחמסים מחסים בל ממלול מחנן ומרשאל גם של ליגס ואנסים בלח: ממסכים בגהניל בגנשי שהסמד: הגבשי שהסמד לגנות גברה גו מרחה לאסמו לכח אסים הגנובי לאחר מסלב גרה, הגשרי עמקנ. שן תקנו שרהצמבטנ. גגה בממרים גגרה. הוב גמיי לאחר הממסכה וריגלה רגהת תגב. גריקה בארי הריקות: הגקן לאח אריית החגנסו","c":"low"},"4334":{"t":"טיפול בשטחים לא חקלאיים\n\nשטחים לא חקלאיים\n\nמינון (מ\"ל/דונם)\tסוג הקרקע\tהערות\tשילובים\n400\tכל הקרקעות\tיש לשלב עם טיפון בריכוז 1.5%-1% להיזוק הדרבנה ע\"י גשם או המטרה","c":"low"},"1325":{"t":"א. יש להשתמש בתכשיר בחדרי אטימות (כגון פוליאתילן בעובי 150 מיקרון). יש להיצמד לדרישות השימוש של [לא ברור], באמצעות שקית חלל דק.\nב. בועות וחדרי אדי אויר - יש להשתמש בחדר אדי אטימות בהגנה בגעיות יעודיות.","c":"low"},"1638":{"t":"הוראות שימוש: אין לשלב תכשיר זה עם תכשירים מסחריים. אין לשלב עם תכשירים אחרים, מלבד אלה המצוינים בהיתר ריסוס קולטני עשבים. אין לשלב עם תכשירים המכילים [לא ברור] יוני ברזל 0.5%","c":"low"}}</script>
