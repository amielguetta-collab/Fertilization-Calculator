<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>הגנת הצומח — פנורה סידס</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#12181c; --ink-2:#4a565e; --ink-3:#8d9aa2;
  --paper:#f7f6f2; --card:#fff; --rule:#e0ddd4;
  --seal:#1f4a3f;              /* ירוק דיו — צבע הרשות, לא צבע ה-IPM */
  --seal-soft:#e8efec;
  --g:#3aa655; --y:#e8b923; --r:#d64545;
  --warn-bg:#fdf6e3; --warn-ink:#8a6d1a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--paper);color:var(--ink);font:400 16px/1.55 Heebo,system-ui,sans-serif;
     padding-bottom:120px;-webkit-font-smoothing:antialiased}
.wrap{max-width:760px;margin:0 auto;padding:0 14px}

/* ---------- כותרת ---------- */
header{background:var(--seal);color:#fff;padding:18px 0 14px}
header .wrap{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
h1{font:900 25px/1.1 'Frank Ruhl Libre',serif;letter-spacing:-.01em}
.sub{font-size:12.5px;color:#a9c6bb;letter-spacing:.02em}

/* ---------- בורר גידול ---------- */
.crops{display:flex;gap:0;margin:16px 0 12px;border:1.5px solid var(--seal);border-radius:10px;overflow:hidden}
.crops button{flex:1;padding:13px 4px;background:var(--card);border:0;font:500 16px Heebo;
  color:var(--seal);cursor:pointer;border-inline-start:1px solid var(--seal)}
.crops button:first-child{border-inline-start:0}
.crops button[aria-pressed=true]{background:var(--seal);color:#fff;font-weight:700}

/* ---------- חיפוש + סינון ---------- */
.search{position:relative;margin-bottom:10px}
.search input{width:100%;padding:13px 42px 13px 14px;border:1.5px solid var(--rule);border-radius:10px;
  font:400 16px Heebo;background:var(--card)}
.search input:focus{outline:2px solid var(--seal);outline-offset:-1px;border-color:var(--seal)}
.search svg{position:absolute;inset-inline-end:14px;top:14px;color:var(--ink-3)}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.chip{padding:7px 13px;border:1.5px solid var(--rule);border-radius:100px;background:var(--card);
  font:500 13.5px Heebo;cursor:pointer;display:flex;align-items:center;gap:6px;color:var(--ink-2)}
.chip[aria-pressed=true]{border-color:var(--ink);color:var(--ink);background:#fff}
.dot{width:10px;height:10px;border-radius:50%;flex:none}
.dot.g{background:var(--g)} .dot.y{background:var(--y)} .dot.r{background:var(--r)}
.sug{position:absolute;inset-inline:0;top:calc(100% + 4px);background:var(--card);
  border:1.5px solid var(--rule);border-radius:10px;box-shadow:0 8px 24px rgba(18,24,28,.12);
  z-index:30;overflow:hidden;max-height:340px;overflow-y:auto}
.sug button{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:10px 14px;background:none;border:0;border-bottom:1px solid var(--rule);
  font:400 15px Heebo;color:var(--ink);cursor:pointer;text-align:start}
.sug button:last-child{border-bottom:0}
.sug button:hover,.sug button.on{background:var(--seal-soft)}
.sug .term{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sug .term b{color:var(--seal);font-weight:700}
.sug .meta{flex:none;display:flex;align-items:center;gap:7px}
.sug .kind{font:500 11px Heebo;color:var(--ink-3);background:#f0eee7;padding:2px 7px;border-radius:5px}
.sug .n{font:500 12px Heebo;color:var(--ink-3);min-width:26px;text-align:center}
.count{font-size:13px;color:var(--ink-3);margin-bottom:12px}

/* ---------- כרטיס ---------- */
.card{background:var(--card);border:1px solid var(--rule);border-radius:12px;margin-bottom:12px;
  display:flex;overflow:hidden}
/* אלמנט החתימה: פס ה-IPM. במלפפון הוא מתפצל לשניים. */
.ipmbar{width:9px;flex:none;display:flex;flex-direction:column}
.ipmbar i{flex:1}
.ipmbar i.g{background:var(--g)} .ipmbar i.y{background:var(--y)} .ipmbar i.r{background:var(--r)}
.ipmbar i.n{background:repeating-linear-gradient(45deg,#e6e3da,#e6e3da 3px,#f2f0e9 3px,#f2f0e9 6px)}
.body{flex:1;padding:14px 15px;min-width:0}

.top{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.name{font:700 19px/1.25 'Frank Ruhl Libre',serif}
.pest{font-size:14px;color:var(--ink-2);margin-top:1px}
.pest em{font-style:italic;color:var(--ink-3);font-size:13px}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px}
.tag{font:500 11.5px Heebo;padding:2.5px 8px;border-radius:5px;background:#f0eee7;color:var(--ink-2)}
.tag.moa{background:var(--seal-soft);color:var(--seal);font-weight:700;letter-spacing:.03em}
.tag.gen{background:#efe7f5;color:#6b3fa0}
.tag.org{background:#e6f4ea;color:#1e7a3c}

.ipmline{display:flex;gap:12px;margin-top:11px;flex-wrap:wrap}
.ipmline b{display:flex;align-items:center;gap:6px;font:500 13px Heebo;color:var(--ink-2)}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(112px,1fr));gap:1px;margin-top:13px;
  background:var(--rule);border:1px solid var(--rule);border-radius:8px;overflow:hidden}
.cell{background:#fbfaf7;padding:8px 10px}
.cell span{display:block;font:500 11px Heebo;color:var(--ink-3);letter-spacing:.02em}
.cell b{font:500 15px Heebo;color:var(--ink)}
.cell b.big{font-size:17px;font-weight:700}

.uses{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.use{border:1px solid var(--rule);border-radius:8px;padding:9px 11px;background:#fbfaf7}
.use-pest{font:600 15px 'Frank Ruhl Libre',serif;margin-bottom:6px}
.use-pest em{font-style:italic;color:var(--ink-3);font-size:12.5px;font-family:Heebo}
.use-grid{display:flex;gap:14px;flex-wrap:wrap}
.uc span{display:block;font:500 10.5px Heebo;color:var(--ink-3)}
.uc b{font:600 15px Heebo}
.use-note{margin-top:6px;font-size:12px;color:var(--ink-3);line-height:1.4}
.more{margin-top:8px}
.more summary{cursor:pointer;font:500 13px Heebo;color:var(--seal);padding:6px 0;list-style:none}
.more summary::-webkit-details-marker{display:none}
.more summary::before{content:"▾ ";font-size:11px}
.more[open] summary::before{content:"▴ "}
.more .use{margin-top:8px}
.mix-ok{background:#eef4f0}
.mix-ok b{color:#183a31}
.mix-ok span{color:#28564a}
.mix-low{background:#fdf6e3}
.mix-low b,.mix-low span{color:#8a6d1a}
.mix{margin-top:11px;padding:9px 11px;background:var(--warn-bg);border-radius:8px;
  font-size:13px;color:var(--warn-ink);display:flex;gap:8px;align-items:flex-start;line-height:1.45}
.mix-ok,.mix-low{margin-top:11px;padding:10px 12px;border-radius:8px;font-size:13px;line-height:1.5}
.mix-ok{background:#eef4f0;border:1px solid #cfe3d8}
.mix-low{background:var(--warn-bg);border:1px solid #ecdca8}
.mix-h{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.mix-ok .mix-h{color:var(--seal)} .mix-low .mix-h{color:var(--warn-ink)}
.mix-t{color:var(--ink);white-space:pre-line}
.mix-warn{margin-top:6px;font-weight:500;color:var(--warn-ink)}
.mix-none{margin-top:11px;padding:9px 11px;background:#f4f2ec;border-radius:8px;font-size:13px;color:var(--ink-3);display:flex;gap:8px;align-items:flex-start;line-height:1.45}
.label{margin-top:11px;display:inline-flex;align-items:center;gap:7px;padding:9px 14px;
  background:var(--seal);color:#fff;border-radius:8px;font:700 14px Heebo;text-decoration:none}
.note{margin-top:9px;font-size:12.5px;color:var(--ink-3);line-height:1.45}

/* ---------- מחשבון ---------- */
.calc{position:fixed;bottom:0;inset-inline:0;background:var(--card);border-top:2px solid var(--seal);
  padding:11px 0 max(11px,env(safe-area-inset-bottom));z-index:20;box-shadow:0 -6px 24px rgba(18,24,28,.09)}
.calc .wrap{display:flex;gap:9px;align-items:center}
.fld{flex:1;min-width:0}
.fld span{display:block;font:500 11px Heebo;color:var(--ink-3);margin-bottom:2px}
.fld input{width:100%;padding:9px 10px;border:1.5px solid var(--rule);border-radius:8px;
  font:500 16px Heebo;text-align:center;background:var(--paper)}
.fld input:focus{outline:2px solid var(--seal);outline-offset:-1px}
.qty{background:var(--seal);color:#fff;padding:9px 15px;border-radius:8px;text-align:center;flex:none}
.qty span{display:block;font-size:10.5px;color:#a9c6bb}
.qty b{font:700 17px Heebo;white-space:nowrap}

.empty{text-align:center;padding:48px 20px;color:var(--ink-3)}
footer{padding:26px 0 8px;font-size:12px;color:var(--ink-3);line-height:1.7;border-top:1px solid var(--rule);margin-top:26px}
footer b{color:var(--ink-2)}
@media(prefers-reduced-motion:no-preference){.card{transition:border-color .15s}}
</style>
</head>
<body>
<header><div class="wrap">
  <h1 id="h-title">הגנת הצומח</h1><button id="langBtn" style="margin-inline-start:auto;background:rgba(255,255,255,.15);color:#fff;border:0;border-radius:7px;padding:6px 12px;font:600 13px Heebo;cursor:pointer">EN</button>
  <span class="sub" id="h-sub">מאגר משרד החקלאות · שכבת IPM משה"מ · פנורה סידס</span>
</div></header>

<div class="wrap">
  <div class="crops" id="crops"></div>
  <div class="search">
    <input id="q" placeholder="פגע, תכשיר או חומר פעיל" autocomplete="off">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="7.5" cy="7.5" r="5.5"/><path d="M11.5 11.5 17 17"/></svg>
    <div class="sug" id="sug" hidden></div>
  </div>
  <div class="chips" id="chips"></div>
  <div class="count" id="count"></div>
  <div id="list"></div>

  <footer>
    <b>מקורות.</b> מינון, פגע, ימי המתנה וכניסה מחדש — מאגר תכשירי ההדברה של משרד החקלאות.
    דירוג ה-IPM — טבלאות שה"מ, והוא <b>שכבה נפרדת</b> שאינה חלק מהרישום החוקי.<br>
    <b>התווית גוברת.</b> קרא את התווית לפני כל שימוש. נתוני שילובים אינם כלולים כאן.
  </footer>
</div>

<div class="calc"><div class="wrap">
  <label class="fld"><span>שטח (דונם)</span><input id="area" type="number" inputmode="decimal" value="1" min="0" step="0.1"></label>
  <label class="fld"><span>נפח תרסיס (ל׳/ד׳)</span><input id="vol" type="number" inputmode="decimal" value="100" min="0" step="10"></label>
  <div class="qty"><span>בחר שימוש לחישוב</span><b id="out">—</b></div>
</div></div>

<script id="mix" type="application/json">{"4019":{"t":"שילובים: אין לשלב אגרוצלון עם תכשירי הדברה אחרים. ניתן ליישם את התכשיר לאחר יישום תכשירים המכילים Metam Sodium.","c":"high"},"4430":{"t":"שילובים: הוספת המשטחים תיעשה כמפורט בטבלת הוראות השימוש.","c":"high"},"1800":{"t":"שילובים: אין לרסס עם תכשירים או שאריות ממתקן ריסוס, ממיכל איסוף או ממקרר, אל הרקע, על בריכות דגים ואל מקורות מקווי המים למניהם. יש לסלק תכשירים בשיטות מאושרות על ידי המשרד להגנת הסביבה.","c":"high"},"4364":{"t":"שילובים: בהעדר מידע, אין לשלב אגריפוס בתכשירים נוספים.","c":"high"},"4344":{"t":"יש לשלב עם טיפון בריכוז 1%-1.5% לחיזוק ההדברה של עשבייה קיימת","c":"high"},"4648":{"t":"שילובים: ניתן לשלב עם וורטינו וביוטי פלוס בהדרים.\nבהעדר מידע נוסף אין לשלב תכשיר זה עם תכשירים נוספים עם יישום אובי.","c":"high"},"7567":{"t":"שילובים: ניתן לשלב עם וורטינו וביוטי פלוס בהדרים.\nבהעדר מידע נוסף אין לשלב תכשיר זה עם תכשירים נוספים עם יישום אובי.","c":"high"},"4431":{"t":"שילובים: אין מידע על שילובים.","c":"high"},"1820":{"t":"שילובים: בתפוח נתן לשלב אודאון עם קורונה.\nאין לשלב עם תכשירים בסיסיים.","c":"high"},"1382":{"t":"שילובים: בתפוחי אדמה - בריסוסי עלווה ניתן לשלב עם טלסטאר בהתאם למינונים המופיעים בתווית של כל תכשיר. בגפן - ניתן לשלב עם קנון 50 טריסאור אלטרה.","c":"high"},"4048":{"t":"שילובים: אוואנט נמצא בטוח לשילוב עם התכשירים המפורטים בתנאים בהם נבדק. עם זאת, בהתחשב בתנאים המיוחדים באזורים השונים ובמיגוון שיטות גידול וזנים, יש לבצע בדיקת בטיחות מקדימה בקנה מידה מצומצם לפני מתחשבים בתנאים הנוחות להנחיות המשלב.\nאת השילוב יש לעשות בהתאם להיתר ולהנחיות המפורטות בתוויות התכשיר המשולב.\nגפן: באיפידן, פוליקור, אופיר 2000 , רידומיל גולד נחושת, תיובית, טליוס, קוצ'יד 2000 , סיגנום, פגסוס 250 , פלורמייט, פולארה, תיובית, ראלי, מנקור, קוצ'יד 2000 , בקטין, טריסר\nעגבנייה: פגסוס 250 , פלורמייט, פולארה, תיובית, ראלי, מנקור, קוצ'יד 2000 , בקטין, טריסר 90 אולטרה, קליפמן, שביט, פולאר, תיובית, בקטין, לאנט 90 , טלסטאר, רופאסט, ספיידר. מלון: פלורמייט, מוספילן, מנקור, באיפידן, פולאר, תיובית.\nחסה: לאנט 90 . כרובים: פגסוס 250 . חימצה: קנוון, אטמי אקסטרה. תירס מתוק: לאנט 90.","c":"high"},"1160":{"t":"שילובים (גידולים ותכשירים בטבלת הוראות השימוש)\nבפרחות (חוץ מורדים): ניתן לשלב אוויסקט-S בתכשירים הבאים: רוברל א\"ר, קרטה ת\"מ, אטברון ת\"מ, כמפורט בתוויות הארוזה שלהם.\nבירקות: ניתן לשלב אוויסקט-S בתכשירים הבאים: סיסטאן ת\"מ (למעט פלפל ומלפפון), מנציין 80% א\"ר, מנקור א\"ר.","c":"high"},"4178":{"t":"התכשיר מורשה לשימוש 3 ימים לפני קטיף. שילובים עם תכשירים נוספים: ניתן לשלב שמן אולטראפז בחקלאות קונבנציונלית עם התכשיר הקונבנציונלי אקטינמור. בפלפל ניתן לשלב אולטראפז עם התכשירים הקונבנציונליים: עמיסטר, אקטינמור, אוונט, טריייסר סופר, שביט פולאר ומגי. יש למלא אחר כל הוראות והגבלות השימוש המפורטות בתוויות התכשירים המשולבים.","c":"high"},"1781":{"t":"שילובים: כל שילוב יש לבצע בפספס להוראות תווית הכנסת השילוב. חסה – ניתן לשלב אומי עם נימרודי 1%","c":"high"},"4468":{"t":"שילובים: אין לשלב אוסטין בתכשירים נוספים.","c":"high"},"1489":{"t":"שילובים: בתפוח - ניתן לשלב עם הליוגנופוריות, דורסן ת\"מ, מסאי א\"ר, מי, ורטימק ת\"מ, טריגרד א\"ר, מי, רידומיל גולד MZ ג\"ר ואוויסקט א\"מ. במלון - ניתן לשלב עם אקטרה. בקישוא - ניתן לשלב עם פרוקליים ת\"מ. בפלפל - ניתן לשלב עם סטריגרד א\"ר, פרוקליים ת\"מ, מי, ת\"מ, ורטימק ת\"מ, מוליט ת\"ר, מסאי א\"ר, טריגרד ת\"מ, מסאי א\"ר, ורטימק ת\"מ. בתות שדה - ניתן לשלב עם פרוקליים ת\"מ, מי, ורטימק ת\"מ. באפרסק/נקטרינה - ניתן לשלב עם הליוגנופוריות.","c":"high"},"4384":{"t":"שילובים: בהעדר מידע נוסף, אין לשלב תכשיר זה עם תכשירים אחרים.","c":"high"},"836":{"t":"שילובים: אין לשלב עם מרק קליפורני. בשקד ניתן לשלב עם מרפאן. בגמא השימוש:","c":"high"},"4268":{"t":"שילובים: אין מידע.","c":"high"},"4705":{"t":"שילובים: בהעדר מידע אין לשלב עם תכשירים אחרים.","c":"high"},"1665":{"t":"שילובים: 1. להדברת דגניים בחיטה ניתן לשלב אורורה עם תופיק בהתאם להנחיות המופיעות בתוויות התכשירים. 2. ניתן לשלב בדשן. לצורך שילוב זה יש להתייעץ עם איש שדה באיזורך. בשילוב זה יש להמיס את התכשיר במים במשך 5-10 דקות, לערבבו היטב ורק לאחר מכן להוסיף את התמיסה לדשן. השילוב מגביר את תופעת הצריבות, אך לתופעה זו אין השפעה על היבול.","c":"high"},"1536":{"t":"שילובים: ניתן לשלב בדשנים אוראן ואוראה. בשילובים אלו יש להשרות את התכשיר במים במשך 5-10 דקות, לערבבו היטב ורק לאחר מכן להוסיף את הדשנים. שילוב הדשנים מגביר את תופעת הצריבות. לתופעה זו אין השפעה על היבול.","c":"high"},"1874":{"t":"שילובים: בגפן, ניתן לשלב אורטיבה טופ עם סיזור 80.","c":"high"},"1687":{"t":"שילובים: אין לשלב שילובים שאינן מופיעים בתווית. יש לקרוא בעיון את התוויות של השילובים. בגפן – שילוב אוריוס 25 עם טאקומי או סיזר 80.","c":"high"},"4037":{"t":"שילובים מותרים: יש לפעול לפי הנחיות התווית של תכשירי השילובים. אין לשלב שילובים שאינם מאושרים בתווית זאת.\nבאפרסק, נקטרינה - ניתן לשלב עם מאבריק.\nבגפן - ניתן לשלב עם סיזור 80.","c":"high"},"1765":{"t":"שילובים:\nניתן לשלב אטברון עם התכשירים הרשומים להלן בהתאם להוראות השימוש שלהם.\nבאבטיח: טלסטאר, שמן JMS, דומארק קומבי, דומארק.\nבכותנה: טלסטאר, מנקו-די.\nבכרוב: טלסטאר, טיטאן.\nבמלפפון: דומארק, גופריתר.\nבפלפל: פיראון, גופריתר.\nבקישוא: גופריתר.\nבתות שדה: דומארק קומבי.\nבתפו\"ח: בראבו 720.\nבגזר: קומודור.\nאין לשלב יותר משני תכשירים בריסוס אחד.","c":"high"},"4612":{"t":"* שילוב אטו עם התכשירים: ראונדאף, דיאזורקס, טרופינג, ורטיגו, ספרטה, טלדור, פולאר וסיגנום מאושר רק בחקלאות קונבנציונאלית.\nאין לייש תכשירים אלו בחקלאות אורגנית\n**בשילוב עם קוטלי מזיקים ומחלות אין לייישם מעל 200 סמ\"ק/דונם","c":"high"},"1910":{"t":"שילובים: ניתן לשלב אטופס עם דופלוזן KV, ברומוטריל, דרבי, אקספרס.","c":"high"},"1916":{"t":"שילובים: ניתן לשלב אטופס עם דופלוזן KV, ברומוטריל, דרבי, אקספרס.","c":"high"},"1897":{"t":"שילובים: ניתן לשלב עם התכשירים הבאים (בכפוף לתוויות שלהם): כותנה: סקוור ת.מ., פלפל: אופיר ת.מ., עגבנייה: בראבו ת.ר., תפו\"א: בראבו ת.ר., אקרובט ג.ר.","c":"high"},"1604":{"t":"שילובים:\nניתן לשלב אטמי אקסטרה עם התכשירים הבאים, בהתאם למינונים המופיעים בתוויות האריזה שלהם:\nאגוזי אדמה - פליקטרן.\nעגבניה - טלסטאר, פליקטרן, מוליט, ורטימק, אוונט, אטברון, אפלורה, מוספילן, מנקו-די, קליפמן.\nחציל - טלסטאר, ורטימק, פליקטרן, אפלורה, טייגר.\nתפוח - דורסן, ורטימק, פליקטרן.\nאפרסק - מאבריק, סנסה.\nחימצה (בריסוס) - קנון 50.","c":"high"},"1940":{"t":"שילובים: שילוב עם קוטלי עשבים להדברת העשבים רח\"ע על מנת להרחיב את התדברת העשבים רח\"ע.\nעמידות: באזורים שנים בארץ התגלו אוכלוסיות של מיני עשבים שפיתחו עמידות או סבילות לתכשירים מעכבי ALS. בשדות כאמור יש להקפיד ולנקוט באמצעים המכוונים להתמודד עם בעיית העמידות כמפורט במלצות ובדפי ההדרכה. בכל מקרה שיש חשד לקיומם של מיני עשבים שפיתחו עמידות או סבילות כאמור, יש להשתמש בקוטלי עשבים אחרים עם מנגנון פעולה שונה מתכשיר זה.","c":"high"},"278":{"t":"לשלב מסטח- DX בריכוז 0.5% . להדברת עשבים מתחמקים מפעילות הטריאזינים להדברת עשבים מתחמקים ולקטילת עשבים קיימים גדולים יש לשלב אטרנקס עם תכשיר מתאים המו­רכב לגידול. לחיזוק ההדברה של נבטי עשבים ניתן לשלב מסטח- DX בריכוז %0.5 .","c":"high"},"11025":{"t":"שילובים:\nאין לשלב שילובים שאינם מופיעים בתוויות. יש לקרוא בעיון את ההנחיות המאושרות בשילובים:\nבחקלאות אורגנית:\nבפלפל - ניתן לשלב עם התכשיר טרייסר אולטרה.\nבמרווה - ניתן לשלב התכשירים: תותח, פרוביט.\nבחקלאות קונבנציונלית:\nבפלפל - ניתן לשלב עם התכשירים: עמיסטר, ורטימק, אוונס, שביט, פולאר ומצי.\nבענבניה - ניתן לשלב עם התכשיר פלורמייט במינון 50 סמ״ק/ד.\nבהדרים - ניתן לשלב EOS עם התכשיר אפלודר בריכוז 0.15%, ועם התכשיר ורטימק בריכוז 0.05%.\nבאפרסק ובנקטרינה - ניתן לשלב EOS עם התכשיר סייד 80.\nבתפוח, מלפפון, מלון, אבטיח, ענבניה, חציל ופלפל - ניתן לשלב EOS עם התכשיר דיפנדר.","c":"high"},"4196":{"t":"שילובים:\nלהדברת מגוון רחב של עשבים שוטים, ניתן לשלב עם אלכור סופר (עם סטרון) ואלכור סופר, צריך להנוג לפי התוויות של התכשירים לגבי הגידולים המותרים, המועדים ואמצעי הזהירות שצריך לנקוט בעת השימוש בהם.","c":"high"},"4721":{"t":"שילובים: אירון מקס אינו מתאים לשילוב בתכשירים אחרים.","c":"high"},"4774":{"t":"שילובים: אירון מקס פרו לגן אינו מנוסה בשילוב עם תכשירים אחרים. בהעדר מידע, אין לשלב אותו בתכשירים אחרים.","c":"high"},"1832":{"t":"שילובים: בתפות ניתן לשלב עם שריף סופר ת.מ., קסטרה ת.ר., פלינוס ג.ר., סטרוביל ג.ר., מניסטר ת.ר. ואנוידור ת.ר. במינונים המאושרים בתווית התכשיר.","c":"high"},"4280":{"t":"שילובים: ניתן לשלב את התכשיר \"אינדיגו\" בגידולים הבאים לתוועית התכשיר המשולב. אפרסק: דואס, אטלס, ביומקסין","c":"high"},"4023":{"t":"שילובים: ניתן לשלב עם מרפאק 50 א.ר. באגס, אפרסק, גפן, ורד, משמש, שסק, ותפוח. ניתן לשלב עם סיפרין 10 ת.מ. / סיפרין 20 ת.מ. באפרסק, שסק, משמש, תפוח. ניתן לשלב עם סיפרין 20 בכיתה.","c":"high"},"4257":{"t":"שילובים מותרים: בגוף טבלת היישום, באבטיח ניתן לשלב אינוורט עם וינטו, אקסטאסטאר ומטאור.","c":"high"},"4633":{"t":"שילובים: בתפוח - ניתן לשלב עם מרפאן 80 גר.\nבאגס - ניתן לשלב עם מרפאן 80 גר.\nכפוף להוראות, למגבלות ולאמצעי הזהירות המפורטים בתוויות שלהם בגמר השימוש.","c":"high"},"4654":{"t":"שילובים: יש לשלב עם צבען אגרוסר אדום 112 לסימון הזרעים המטופלים.","c":"high"},"4520":{"t":"שילובים:\nבחמצה: ניתן לשלב עם בוראל ופרומו בהתאם לתוויות התכשירים.\n\nבגמר השימוש: אין לרוקן את המיכל מהשאריות בהתאם להנחיות לסילוק תשטיפים. אין לשטוף את המרסס וכל חלקיו במים ודטרגנט. את התשטיפים יש לסלק בהתאם להנחיות לסילוק תשטיפים.\n\nסילוק תשטיפים: אין לרוקן ולשטוף תכשירים או שאריות ממתקן ריסוס ממיכל איסוף או ממתקן אחר אל הקרקע, אל בריכות דגים ואל מקורות ומקווי המים להמינהם. יש לסלק תשטיפים בשיטות מאושרות על ידי המשרד להגנת הסביבה, כגון ריסוס בשטח חקלאי, שימוש חוזר, טיהור, אידוי ופינוי לאחר הפסולת הרעילה ברמת עולה.","c":"high"},"4235":{"t":"שילובים: בהעדר מידע נוסף, אין לשלב שני טיפולים בתכשירים מקבוצות כימיות שונות.","c":"high"},"292":{"t":"שילובים:\nאין לשלב עם תכשירים אחרים","c":"high"},"1699":{"t":"שילובים: אין לשלב אל–חלד עם כל תכשיר אחר.","c":"high"},"954":{"t":"אזהרות: אין לערבב התכשיר עם חומרים מחמצנים.","c":"high"},"4644":{"t":"שילובים: בהעדר מידע נוסף, אין לשלב את התכשיר עם תכשירים אחרים.","c":"high"},"98":{"t":"שילובים: בכל שילוב יש לפעול בכפוף להוראות התכשיר המשולב.\n1. ניתן לשלב את התכשיר עם דיאורקס.\n2. בתפוח, אגס, אפרסק, משמש, הדרים ואבוקדו, להדברת עשביה קיימת ניתן לשלב 1.5% אלבר סופר עם 1% ראונדאפ, בנפח תרסיס 20 ל\"/ד.\n3. להכנת שטחים המיועדים לגדגני חורף בעונה העקובת, ניתן לשלב 300 סמ\"ק/ד' אלבר סופר עם 300-500 סמ\"ק/ד' ראונדאפ.\n4. אין לשלב עם תכשירים אחרים.","c":"high"},"470":{"t":"שילובים: ניתן לערבב אלבר-מ עם קוטלי עשבים כגון: דיורקס ורגלון. בחיטה ניתן לשלב עם אקופורט. אין לערבב אלבר-מ ת.מ. עם קוטלי מזיקים או מדבירי מחלות.","c":"high"},"7470":{"t":"שילובים: הניסיון שנצבר מלמד שניתן לשלב אלגה עם מרבית תכשירי ההדברה וחומרי הזנה. למרות זאת, לפני שילוב של אלגה עם תכשירי הדברה והזנה מומלץ לבצע בדיקה מקדימה כדי למנוע מפגיעה בגידול. בהעדר מידע אין לשלב תכשיר זה עם חומרים משתחמים המכילים גליקול או שמנים. השילוב עלול לגרום לפגיעה בגידול.","c":"high"},"4426":{"t":"שילובים: אין לשלב עם תכשירים נוספים.","c":"high"},"966":{"t":"שילובים: בקישוא ופלפל - ניתן לשלב את האלסיסטין עם התכשיר באיפידן.","c":"high"},"1429":{"t":"שילובים:\nבתפוח מהזן זהב לדילול פריחה וניתן לשלב אלפאנול סופר עם דילאמיד, בכפוף לתוויות התכשיר דילאמיד.","c":"high"},"1025":{"t":"שילובים: ניתן לשלב אמבר עם טופיק, אלבר סופר, אקספרס. יש להתחשב גם במגבלות ואמצעי הבטיחות המפורטים של החומר המשולב.","c":"high"},"4133":{"t":"הערות ליישום: אין לרסס יותר משני ריסוסים עוקבים. לפני החזרה לשימוש בתכשיר יש ליישם שני טיפולים בתכשירים בעלי מנגנון פעולה שונה (מקב' כימית שונה) להדברת אותן עשביות. בל איסור לרסס אחר, בזמן ולפני זפי למזג אוויר חריג (שרב, קרה וכו') ו/או על גידולים השרויים בעקה. בכל מקרה של ספק, מומלץ להתייעץ עם בעל מקצוע.","c":"high"},"1625":{"t":"שילובים: להדברת עשבים קיימים הגדולים עם עשבים 2 עלים אמיתיים, יש לשלב עם ראונדאפ, בהתאם לתנאי המשתמש.","c":"high"},"4091":{"t":"שילובים: ניתן לשלב את התכשיר אמפליגו עם התכשירים הבאים:\nבכל שילוב יש לפעול בכפוף להוראות התכשיר המשולב. אין לשלב עם תכשירים אחרים.\nעגבניה - פיראט, מטרונום.\nגזר - בראבו.\nכרוביים - טלסטאר, מטרונום.\nגפן - דומארק, קנון.\nמלפפון - מטרונום, פיראט, דומארק, קוסמוס, סכיור, גלבן מנקוזב, דאקוניל.\nאגוזי אדמה - בראבו, אטמי אקסטרה.\nפלפל - פריורי אקסטרה.\nרימון - הרקולס.\nחימצה - קנון, קוסמודור, אטמי אקסטרה, בראבו, פוליקור.\nחמניה - פריורי אקסטרה.","c":"high"},"4320":{"t":"שילובים: אין מידע","c":"high"},"7555":{"t":"שילובים: אין מידע","c":"high"},"1772":{"t":"שילובים:\nחובה לשלב משטח (ראה בטבלת הוראות שימוש). ניתן לשלב אנווק במינון 1 גרם לדונם עם סטייפל בתוספת הדברת תורה וסולנום שחור ('ענבי שועל') (ראה גם הנחיות בתוויות סטייפל).\nאין לשלב אנווק עם שום תכשיר אחר. יש להבטיח פרק זמן של 7 מים בין ריסוס אנווק לבין ריסוס קוטלי עשבים דגניים בשדה.","c":"high"},"499":{"t":"שילובים: בהעדר מידע אין לשלב תכשיר זה עם תכשירים אחרים.","c":"high"},"7519":{"t":"שילובים מותרים:\nאין לשלב עם חומרים נוספים.","c":"high"},"1971":{"t":"שילובים: אין מידע","c":"high"},"1752":{"t":"שילובים מותרים: בתפא\"ד מותר לשלב עם לינורקס ת.ר. בהתאם לתווית התכשיר.","c":"high"},"1032":{"t":"שילובים:\nבפלפל - יש לנהוג על פי הוראות השימוש הכתובות על גבי תווית התכשיר המשולב.\nאין לשלב עם תכשירים נוספים.","c":"high"},"4670":{"t":"שילובים: בהעדר מידע אין לשלב עם תכשירים אחרים.","c":"high"},"1124":{"t":"שילובים:\nכותנה - ניתן לשלב עם טלסטאר ת.מ., לאנט ת.נ.ג., מוליט ת.ר., סמש ת.מ., פיקס ת.נ.\nחציל - ניתן לשלב עם סמש ת.מ., קרטה ת.מ.\nמלון - ניתן לשלב עם טלסטאר ת.מ., קרטה ת.מ.\nפלפל - ניתן לשלב עם סיסטאן ת.מ., קרטה ת.מ.\nמלפפון - ניתן לשלב עם סמש ת.מ., אויסקטו א.מ.\nהדרים - ניתן לשלב עם 0.5% שמן קיצי-ויטול, EOS בריכוז 1%.\nגפן - ניתן לשלב עם מז'י ת.מ., סיסטאן ת.מ. מאבריק ת.ש.\nאפרסק, נקטרינה, שקד ושזיף - ניתן לשלב עם מאבריק ת.ש.\nרימון - ניתן לשלב עם EOS בריכוז 1%.","c":"high"},"4625":{"t":"שילובים: אין לשלב עם תכשירים אחרים.","c":"high"},"4211":{"t":"שילובים מותרים: יש לבצע שילובים רק בהתאם להנחיות התווית של התכשיר, ורק בגידולים ובחומרים המפורטים כאן:\nבחציל - ניתן לשלב אצטאסטאר עם התכשירים: אפולו, פלורמייט, דיפנדר, נימגארד, אקסמייט, אינפירט.\nבקישוא - ניתן לשלב אצטאסטאר עם התכשירים: נמרוד, שביט, נץ, הליוגופריט, דומארק.\nבגפן - ניתן לשלב אצטאסטאר עם אביר או אזימוט.\nבאבטיח - ניתן לשלב אצטאסטאר עם שביט, וינטו, LQ215 ו-EOS.","c":"high"},"4160":{"t":"שילובים: תפוח אדמה ועגבניה - למניעת עמידות, חובה לשלב אצן בדרנופיקס כמפורט בטבלה. מלפפון - ממלץ לשלב במנקוטל במינון 150 גר'/ד'.\nגפן - למניעת עמידות, חובה לשלב בקיף כמפורט בטבלה. שילוב עם קיף מלכלך מנעת את האשכולות.","c":"high"},"1758":{"t":"שילובים: שילוב עם תכשירים נוספים יעשה לפי הוראות השימוש של התכשיר הנוסף, ורק ע\"פ השילובים המצוינים המוצעים:\nשילובים מותרים עם אקופרט:\n- בחיטה ניתן לשלב עם בכמינון 100 סמ\"ק/ד' להדברת מצליבים, חרצית וסלק.\nניתן לשלב עם דרבי 3 ג'/ד' או אקספרוס 1 ג'/ד' להדברת תלתן, אמיר וקדד.\n- באגוזי אדמה ניתן לשלב עם בזאגרן בכמינון 150 סמ\"ק/ד'.","c":"high"},"4420":{"t":"שילובים: בהעדר מידע, אין לשלב תכשיר זה עם תכשירים אחרים.","c":"high"},"1887":{"t":"שילובים: אין לשלב את התכשיר עם תכשירים אחרים למעט שמן בהדרים כמצוין בהוראות השימוש.","c":"high"},"1635":{"t":"שילובים:\nבגפן: ניתן לשלב אקטרה עם דורסן, אופיר, פלינט, פוליקור, סימבוש.\nבאפרסק ונקטרינה: ניתן לשלב עם אופיר, שביט, סיסטאן, הליוגופריית ופלינט.\nבפלפל: ניתן לשלב עם טריייסר, אופיר, פרוקליים, ורטימק ומסאי.\nבמלפפון: ניתן לשלב עם אופיר, שביט, ורטימק המשולב עם BB5, מסאי, אקרובט, רידומיל גולד MZ ג\"ר, דומרק ושמן ויראל.\nבתפוח: ניתן לשלב עם אופיר, שביט, פליקטרן ופלינט.","c":"high"},"1941":{"t":"שילובים: להשתמש בתוארית המשולבת על פי הוראות השימוש שבתוויות המשולב. השילובים נבדקו רק בזן שצייון, יש לבחון את השילוב בזנים אחרים לפני ריסוס מסחרי. בהעדר מידע נוסף אין לשלב תכשיר זה עם תכשירים אחרים.","c":"high"},"4270":{"t":"שילובים: אין לשלב אקנטו פלוס בתכשירים נוספים.","c":"high"},"4332":{"t":"שילובים: להדברה משולבת של עשבים דגניים ורחבי עלים בחיטה ניתן לשלב אקסיאל עם התכשירים הבאים: ברומוטריל, דרבי, אקספרס ואמבר.\nאין לשלב עם אורורה, אורורה טורבו, אקפארט ולוטוס או עם תכשירים הורמונאליים (דופלוזן, אופטיקה ותכשירי ד-2.4).","c":"high"},"4180":{"t":"שילובים: אקסירל נבדק ונמצא בטוח לשילוב עם תכשירים כגון: במלפפון - קנולו, בהדרים - נו-לור, בזית - נו-לור, בתפוח, באפרסק ובנקטרינה - נו-לור, פלירל. בכל הגידולים - אין לשלב אקסירל עם סטרוביולורינים. יתרה מזאת, יש להמתין לפחות 5 ימים בין יישום אקסירל לריסוס סטרוביולורינים ולהפך.","c":"high"},"1859":{"t":"שילובים: בעגבנייה ניתן לשלב אקסמייט עם מיקרוטיול. במילון ניתן לשלב אקסמייט עם מיקרוטיול. בפלפל ניתן לשלב אקסמייט עם מיקרוטיול.","c":"high"},"1814":{"t":"שילובים: ניתן לשלב אקרובט עם ורטימק ת\"מ, פלינט ג\"ר, טריגרד א\"ר, מץ ת\"מ, מוליטין ת\"ר, סקור ת\"מ, א ילובים: אין לרסס באסטון עם תכשירים אחרים בטנק. אין לרסס באסטון על צמחים בטרם הגיע לשלב הדזקנתום הטבעי. אין לרסס באסטון בשדות מסוידים לייצור זרעים.","c":"high"},"1775":{"t":"שילובים: יש לשלב עם טריטון 100 x- 0.025%","c":"high"},"455":{"t":"שילובים: אין לשלב בזאגרן משטח. אין לשלב בזאגרן עם תכשירים נוספים למעט: באגנוזי אדמה ניתן לשלב עם דגנול.\n\nגידולים עוקבים במחזור: לבזאגרן לבד אין הגבלה. בשילובים יש להתייחס להגבלות גידולים עוקבים של התכשיר המשולב.","c":"high"},"4008":{"t":"שילובים: אין לשלב בי-סקט עם תכשירים אחרים - טרם נבדק.","c":"high"},"1306":{"t":"שילובים: ניתן לשלב את התכשירים הבאים בחקלאות קונבנציונלית בלבד:\nמחץ בריכוז 0.07%\nבשקד, אפרסק, נקטרינה, משמש, שזיף, תפוח, הדרים, אבוקדו, ריגון, ענבנייה ועצי אזר.\nכלמיקס בריכוז 0.05% אפרסמון.\nאנו. בחקלאות אורגנית וקונבנציונלית, בריכוז 0.2% - בהדרים, אבוקדו, ענבנייה, אבוקדו ותמר.","c":"high"},"7088":{"t":"שילובים: ניתן לשלב את התכשירים הבאים בהחקלאות קונבנציונלית בלבד:\nמחץ בריכוז 0.07%\nבשקד, אגרוס, נקטרינה, משמש, שזיף, תפוח, הדרים, אבוקדו, ריגון, עגבנייה ועצי אגוז.\nכלמיפס בריכוז 0.05% אפרסמון.\nאנו, בחקלאות אורגנית וקונבנציונלית, ריכוז 0.2% - בהדרים, עגבנייה, אבוקדו ותמר.","c":"high"},"11042":{"t":"שילובים: ניתן לשלב את התכשירים הבאים בחקלאות קונבנציונלית בלבד:\nמחץ בריכוז 0.07%\nכלפיר בריכוז 0.05% ובאפרסמון.\nאנ. בחקלאות אורגנית וקונבנציונלית, ריכוז 0.2% - בהדרים, אבוקדו ותמר.","c":"high"},"7540":{"t":"שילובים: בנזר, מלפפון, ענבנייה ופלפל ניתן לשלב, בהקלאות קוונבציונאליות, עם חטא בריכוז 0.07%. בנזר ניתן לשלב עם אזו בריכוז 0.2%.","c":"high"},"4456":{"t":"שילובים: בגזר, מלפפון, עגבנייה ופלפל ניתן לשלב, בחקלאות קונבנציאלית, עם מחץ בריכוז 0.07%. בגזר ניתן לשלב עם אטו בריכוז 0.2%.","c":"high"},"4458":{"t":"שילובים: בהיעדר מידע נוסף אין לשלב תכשיר זה עם תכשירים נוספים עם יישום ביונארד GR.","c":"high"},"4619":{"t":"שילובים: אין לשלב עם תכשירים אחרים","c":"high"},"7579":{"t":"שילובים:\nבהיעדר מידע נוסף אין לשלב תכשירים נוספים עם יישום ביוסייב.","c":"high"},"4525":{"t":"שילובים:\nבהיעדר מידע נוסף אין לשלב תכשירים נוספים עם יישום ביוסייב.","c":"high"},"1905":{"t":"שילובים:\nבשזיף (\"S-45\") - ניתן לשלב עם פוליקור 250 ת.מ. (אין לשלב בזמן פריחה מחשש לפגיעה בדבורים) פלנט 50% ג.ר.\nבאפרסק (\"יסאמור סייד\") - ניתן לשלב עם פלנט 50% ג.ר. באיטרוויזי.\nבכרוב (פרוקטור) - ניתן לשלב עם מוכנסו 100 ת.ר.\nבגנבניה (870, אנטוניה) - ניתן לשלב עם אורדן 240 ת.ר., ת.מ., ט.ר., זנים: טרה קוטה, שרי תמר, רינקוס, ברונו ומוניה ניתן לשלב עם מוכנסו 100 ת.ר.\nבקישוא (קוריאנו, פוטון) - ניתן לשלב עם מוכנסו 100 ת.ר.\nבמלון (גולד, פירנה, בלנס, יריב) - ניתן לשלב עם מוכנסו 100 ת.ר.\nבאבטיח (מלאי, מקסימה) - ניתן לשלב עם מוכנסו 100 ת.ר.\nיש להשתמש במוצרים בהתאם להוראות המשתמש על פי הוראות הגיטוויות התכשיר המשולב.\nבהעדר מידע נוסף אין לשלב תכשיר זה עם תכשירים אחרים.\n* השילובים בבדקו רק בזן שצוין. יש לוודאן את השילוב בזנים אחרים לפי ריסוס מסחרי.","c":"high"},"4495":{"t":"שילובים: אין לשלב בלאש בתכשירים נוספים.","c":"high"},"4702":{"t":"שילובים: אין לשלב בתכשירים נוספים.","c":"high"},"7059":{"t":"שילובים: במקרה של שילוב עם תכשירים אחרים, יש להכניס בלו-שילד תחילה למכל המרסס.","c":"high"},"11028":{"t":"שילובים: במקרה של שילוב עם תכשירים אחרים, יש להכניס בלו-שילד תחילה למכל המרסס.","c":"high"},"870":{"t":"שילובים: במקרה של שילוב עם תכשירים אחרים, יש להכניס בלו-שילד תחילה למכל המרסס.","c":"high"},"4701":{"t":"שילובים: אין לשלב בתכשירים נוספים.","c":"high"},"7509":{"t":"שילובים: בהעדר מידע אין לשלב את התכשיר עם תכשירים נוספים.","c":"high"},"4365":{"t":"שילובים: בהעדר מידע נוסף אין לשלב בלוסום פרוטקט בתכשירים אחרים.","c":"high"},"4508":{"t":"שילובים: אין לשלב בלוקדה בתכשירים אחרים.","c":"high"},"4319":{"t":"שילובים:\n• אין להוסיף לתכשיר בנטון משטח\n• בבקיה ותלתן ניתן לשלב עם פולסאר: בנטון 40 סמ\"ק/ד'+פולסאר 60 סמ\"ק/ד'\n• בבקיה ניתן לשלב עם אקופרט: בנטון 75 סמ\"ק/ד'+אקופרט 45 סמ\"ק/ד'","c":"high"},"4441":{"t":"שילובים: בעת הצורך ניתן לשלב בבסטה מונע הצצה שאריתי מומלץ. כאשר משלבים בסטה במונעי הצצה שאריתיים, לצורך קטילת עשבים חד-שנתיים בגובה עד 40 ס\"מ, אפשר להפחית את מינון בסטה ב-20% (כלומר: 400-200 סמ\"ק/ד' בהתאם לגובה העשבים). לשיפור הדברת מעוג וחלמית מבוססים, מומלץ לשלב בבסטה, רונסטאר במינון 50-100 סמ\"ק/ד'. במקרה של שילוב, יש להתחשב במגבלות ובתנאי השימוש המפורטים בתוויות המשולבים.","c":"high"},"855":{"t":"שילובים: בעת הצורך ניתן לשלב בבסטה שאריית מונע הצצה שארית מלאה. כאשר משלבים בסטה במונעי הצצה שאריתיים, לצורך קטילת עשבים בגובה עד 40 סמ\"מ, אפשר להפחית את מינון הבסטה ב-20% (כלומר: 200-400 סמ\"ק/ד') בהתאם לגובה העשבים. לשיפור הדברת מעוג וחלמית מבוססים, מומלץ לשלב בבסטה, רונסטאר במינון 50-100 סמ\"ק/ד'. במקרה של שילוב, יש להתחשב במגבלות ובתנאי השימוש המפורטים בתוויות של התכשירים המשולבים.","c":"high"},"699":{"t":"שילובים: בחיטה ניתן לשלב את הברומוטריל עם דופלוזן KV, אקספרס, מוניטור, דרבי, וסי.סי. בהתאם לפרטים על תווית התכשיר המשולב. בשילובים, בזמן עקה, עלולות להיגרם פגיעות חולפות.","c":"high"},"61":{"t":"שילובים מותרים: ב-\"דונג בריטקס 551\" אפשר לשלב חומרי הדברה. החומרים הניתנים לשילוב הם: טלקטו 500, ברוזליל 50, גיברלון. תוספת החומרים הנ\"ל מותרת באישורים לשימוש בהם בארץ והן בארצות להן מיועד הפרי.","c":"high"},"4307":{"t":"שילובים מותרים:\nלאורך פסי רכבת וצדי דרכים בינעירוניות, סביב מאגרי מים ותעלות ניקוז, שטחים סביב יישוב ומתקנים חקלאיים ללא צמחי תרבות - ניתן לשלב את התכשיר עם דיאורקס.\nגפן - ניתן לשלב עם גליגן.\nזית - ניתן לשלב עם גול או גליגן.\nאפרסמון - ניתן לשלב עם דיאורקס או גליגן.\nנקטרינה - ניתן לשלב עם גליגן או פאלקון.\nהדרים - ניתן לשלב את התכשיר עם גליגן או פאלקון.\nשזיף - ניתן לשלב עם פאלקון.\nרימון - ניתן לשלב עם גליגן או פאלקון.\nתפוח - ניתן לשלב עם גליגן או פאלקון.","c":"high"},"4095":{"t":"שילובים:\nניתן לשלב את התכשיר ברק עם התכשירים הבאים בכפוף לתוויות שלהם:\n• עגבניה: קורזייט, סקיפר.\n• תפו\"א: סקיפר, קודקוד, קורזייט.\n• חמצה: אטלס.","c":"high"},"4290":{"t":"שילובים: כל השילובים בכפוף לתוויות התכשיר המשולב\n• בצל: מובנטו, דיקורול 50, ספרה ספור\n• עגבניה: אבר, שונית, אסלו, קלימורה\n• תפוא: שונית, צבר, פרפקט","c":"high"},"4076":{"t":"שילובים: אין לשלב עם כשרים נוספים.","c":"high"},"4389":{"t":"שילובים: להדברת דגנים בחיטה ניתן לשלב עם אטופס (או טיפ-טופ) 60 סמ\"ק/ד'. במקרה של שילוב אורורה או אורורה טורבו ומלץ להעלות נינאון אטופס (או טיפ-טופ) ל-80 סמ\"ק/ד'.","c":"high"},"1730":{"t":"שילובים: אין לשלב את התכשיר עם תכשירים אחרים, פרט לטריטון 100 X.","c":"high"},"4082":{"t":"שילובים: אין לשלב עם תכשירים אחרים, למעט השימוש בטריטון X – 100.","c":"high"},"1605":{"t":"שילובים: שילובים מותרים בחקלאות קונבנציונלית בלבד.\nלא בחקלאות אורגנית.\nניתן לשלב גופריתר עם התכשירים הרשומים להלן, בהתאם להוראות השימוש שלהם:\nבפלפל: פיראס, דורסן, טיטאן, ורטימק, פולאר.\nבמלון: קנון 50, ורטימק.\nבחציל: מוספיל.\nבגפן: דורסן.\nבגזר: בראון.\nבהדרים: אין לשלב עם תכשיר אחר.","c":"high"},"1901":{"t":"שילובים: ניתן לשלב עם UP 50, אסור שילוב עם תכשירי הדברה.","c":"high"},"4451":{"t":"שילובים: אין מידע","c":"high"},"1425":{"t":"שילובים: אבוקדו, אפרסמון, גפן, הדרים, אפרסק, זית – ניתן לשלב מגלן 200 סמ\"ק/ד' (בהתאם הוראות היישום של גבי התכשיר מגלן).","c":"high"},"1847":{"t":"שילובים: אין מידע","c":"high"},"1350":{"t":"שילובים: להדברת מגוון רחב של עשבים קיימים, ניתן לשלב עם גליגן, טומהוק, אלבר סופר. ניתן לשלב עם מוני הצצה (כגון דיאורקס, גליגן). להפעלת דיאורקס דרוש גשם או המטרה תוך 2-3 שבועות לאחר הריסוס, לגליגן תוך 7-14 ימים בהתאם לעונה. בכל השילובים יש לנהוג לפי התוויות של התכשירים לגבי הגידולים המורשים, אמצעי הזהירות וניקוי המרסס.","c":"high"},"1264":{"t":"שילובים: במטע ובפרדס ניתן לשלב גלייפון עם גול או עם גלין לשיפור הציפה ולהגדלת טווח ההדברה של העשבים המודברים. השימוש בתכשירים אלה מותר במינונים ועפ\"י ההוראות והמגבלות המפורטות בתוויות שלהם.","c":"high"},"1258":{"t":"שילובים:\nלהדברת מזון חב של עשבים קיימים, ניתן לשלב עם סטרן או אלבר סופר או עם סטרן ואלבר סופר, צריך לנהוג לפי הוראות של התכשירים לגבי הגידולים המורשים, המועדים ואמצעי הזהירות הצריך לקחת בעת השימוש בהם.","c":"high"},"4120":{"t":"שילובים: אין לשלב גלין בתכשירים נוספים.","c":"high"},"7064":{"t":"שילובים: אין לשלב עם תכשירים נוספים.","c":"high"},"7063":{"t":"שילובים בגמר השימוש: אין לשלב תכשיר זה עם תכשירים נוספים.","c":"high"},"4200":{"t":"שילובים:\nאין מידע","c":"high"},"4545":{"t":"בהעדר מידע נוסף, אין לשלב את התכשיר עם תכשירים אחרים.","c":"high"},"4198":{"t":"שילובים:\nבבצל: ניתן לשלב עם התכשירים מונבטו או דיקרוול 50 בכפוף לתוויות התכשירים.","c":"high"},"1595":{"t":"שילובים:\nראה בטבלת הוראות השימוש. בחימצה ניתן לשלב דואל גולד עם סקור ת\"מ, גלנט סופר, חץ סופר או סלקט סופר.","c":"high"},"4271":{"t":"שילובים: אין לשלב דודין עם תכשירים המכילים גופרית, תכשירי נחושת, מרק בורדו, תכשירי קפטן, קרטן ואינסגר. בהעדר מידע נוסף אין לשלב דודין עם תכשירים אחרים ובכל מקרה מומלץ להתייעץ עם אנשי החברה.","c":"high"},"1408":{"t":"שילובים: ניתן לשלב דומארק עם התכשירים הבאים, בהתאם למינונים המפיסים בתוית הארזיה של כל תכשיר:\n1. מלפפון - פיראט, טיסאן, קנון 50, מנקד-י, קצויד.\n2. מלון - טולסטאר, ורטימק, קנון 50, מנקד-י, קצויד.\n3. אבטיח - אסברון.\n4. קישוא - טיטאן.\n5. פן - דורסן, קנון 50.\n6. גזר - גראבן.\n7. אסתר וגינסינת - ורטימק, מג'.","c":"high"},"1656":{"t":"שילובים: במידה ומשלבים תכשיר נוסף, יש להוסיפו לאחר הכנת תמיסת הריסוס של דומארק קומבי ובהתאם להוראות השימוש המופיעות על התווית שלו:\nאבטיח: ורטימק, מולין, מוספילון, ספיידר, אויסקוט.\nמלון: קוגן 50, מנגן-ד, טלוסטאר, ורטימק, אויסקוט, מוספילון, ספיידר.\nתות שדה: אטברון, פליקטרן, ורטימק, טרייסר אולטרה, פלינט, פולאר, מיתוס.","c":"high"},"1974":{"t":"שילובים מותרים: ב- \"דונג זיודר UPC\" אפשר לשלב חומרי הדברה. החומרים הניתנים לערבוב הם: טקטו 500; ברוזליל 50; ג'ברלון 4. תוספת החומרים הנ\"ל מותנת באישורים לשימוש בהם, הן בארץ והן בארצות להן מיועד הפרי.","c":"high"},"953":{"t":"שילובים מותרים: ב- \"דונג זיודר\" בשימוש על הדרים (למעט פומלו וקומקואט) אפשר לשלב עם הדרה שונים כדי להגן על הפרי מפני ריקבונות בעת המשלוח. התכשירים הינתנים לערבוב הם: ברוזליל, אגרי-ביז. תוספת התכשירים הנ\"ל מותנת באישורים לשימוש בהם, הן בארץ והן בארצות להן מיועד הפרי.","c":"high"},"328":{"t":"שילובים מותרים: ב-\"דונג זיוודר טבעי\" בשימוש על הדרים (למעט פומלו וקומקוואט) אפשר לשלב חומרי הדברה שונים כדי להגן על הפרי מפני ריקבונות בעת המשלוח. התכשירים הניתנים לערבוב הם: ברוזליל; אגרי- ג'יב. תוספת התכשירים הנ\"ל מותנת באישורים לשימוש בהם, הן בארץ והן בארצות להן מיועד הפרי.","c":"high"},"1420":{"t":"שילובים מותרים: ב-\"דונג זיידר פומלו\" אפשר לשלב חומרי הדברה כדי להגן על הפרי מפני ריקבונות בעת המשלוח. החומרים הניתנים לשילוב הם: טקטו 500, ברוטלזיל 50, ג'יברלון. תוספת החומרים הנ\"ל מותנת באישורים לשימוש בהם, הן בארץ והן בארצות להן מיועד הפרי. יש להוסיף 6 - 10 ליטר דונג זיידר לדלי, להוסיף את חומרי ההדברה המתאימים, לערבב בבוחש חשמלי ולשפוך את התערובת למערבל הדונג.","c":"high"},"1299":{"t":"שילובים: לשיפור הדברת עשבים רחבי-עלים כגון: סלק, גדילן, ברקן, אמיר קוצני, חלמית וקדד, ניתן לשלב רק בחיטה דופלוזן KV עם התכשירים הבאים:. ברומוטריל (80 סמ\"ק/ד\"), סנקור, קוורץ, אקספרס ודרבי.\nבחיטה ניתן לשלב דופלוזן עם קוטלי העשבים הדגניים אטופס או טופיק.","c":"high"},"4227":{"t":"שילובים: בהעדר מידע נוסף, אין לשלב את התכשיר עם תכשירים אחרים.","c":"high"},"1530":{"t":"שילובים:\nלהדברת כימשון יש לשלב דותן עם אחד התכשירים הבאים. יש ליישם רק בגידולים המאושרים מטה, ועפ\"י הוראות התוויות של אותם תכשירים.\n- בתפו\"א, יש לשלב דותן עם באנגו פורטה ת.ר (100 סמ\"ק/ד') או קריאל פלוס ג.ר (60 סמ\"ק/ד') או סימוקסי טוף ספרה. בריסוס אווירי ניתן לשלב רק עם באנגו פורטה (נפח תרסיס 5 ליטר לדונם).\n- בעגבניה לתעשייה, יש לשלב דותן עם באנגו פורטה ת.ר (100 סמ\"ק/ד') או קריאל פלוס ג.ר (60 סמ\"ק/ד') או סימוקסי טוף או ספינקס ספרה.\n- בעגבניית מאכל, יש לשלב דותן עם סימוקסי טוף עם ספינקס ספרה.","c":"high"},"1116":{"t":"שילובים: תוספת משטח DX לדיאורקס (עונת חורף שתיוני בלבד) - מגבירה את יעילות דיאורקס בקטילת מגע של עשבים ח\"ש קיימים עד גובה של 5 ס\"מ. אין להשתמש בתוספת DX בקרקע קלה. להדברת עשבים קיימים ניתן לשלב דיאורקס עם גליגון או ראונדאף/גל\"יפוגן - כמפורט בתוויות שלהם.","c":"high"},"4626":{"t":"שילובים: ניתן לשלב בחיטה דיווידנד עם קרוזר ת.ז.","c":"high"},"4437":{"t":"שילובים: בהעדר מידע נוסף, אין לשלב עם תכשיר אחרים.","c":"high"},"944":{"t":"שילובים:\n1. בריסוס נוף בתפוח אדמה, במלפפון ובמלון ניתן לשלב דיינון עם קוצייד 2000.\n2. בהגמעה, אין לשלב עם דשנים.\n\nאזהרה: למרות שעד כה לא נמצאו פיטוטוקסיות של התכשיר במינוני הגמעה המומלצים, הרי בשל הרב-גוניות הרבה של הגידולים ושיטות הגידול, אין אפשרות לערוב לבטיחות התכשיר בכל מקרה. לכן, רצוי שהמגדל יבצע ניסוי מוקדם בצמחים בודדים לפני השימוש בדיינון לבד, ובמיוחד לפני השימוש בשילוב עם תכשירים אחרים.","c":"high"},"4068":{"t":"שילובים: בהעדר מידע, אין לשלב דיינון אנרג'י בתכשירים נוספים.","c":"high"},"1650":{"t":"שילובים: אין לשלב דילווט עם תכשירים אחרים.","c":"high"},"1720":{"t":"שילובים: דימול נבדק ונמצא בטוח לשילוב עם ורקוטול בגידולים: מלפפון, עגבנייה, חציל, פלפל, הדרים, אגס.","c":"high"},"7375":{"t":"שילובים: התכשיר מאושר לשימוש בחקלאות האורגנית. אין לשלב עם תכשירים אחרים.","c":"high"},"617":{"t":"שילובים: אין לשלב עם תכשירים אחרים.","c":"high"},"778":{"t":"שילובים: אסור לשלב עם מרק קליפורני, תכשירי נופרית, מרק בורדו ותכשירי נחושת","c":"high"},"4039":{"t":"בלגינים (אפרסק, נקטרינה, שזיף ומשמש) אין לשלב דינו עם תכשירים אחרים או כל תכשיר אחר.","c":"high"},"4147":{"t":"שילובים: בפלפל ניתן לשלבו עם התכשיר: רידומיל גולד נזלי.","c":"high"},"1877":{"t":"שילובים:\nניתן לשלב כל פיקס, בריכוז 0.05%.","c":"high"},"7356":{"t":"שילובים:\nניתן לשלב כל פיקס, בריכוז 0.05%.","c":"high"},"4084":{"t":"שילובים: בהעדר מידע נוסף, אין לשלב דיקרזול עם תכשירים נוספים.","c":"high"},"9078":{"t":"שילובים: בהעדר מידע נוסף, אין לשלב דיקרזול עם תכשירים נוספים.","c":"high"},"9098":{"t":"שילובים: בהעדר מידע נוסף, אין לשלב דיקרזול עם תכשירים נוספים.","c":"high"},"1410":{"t":"שילובים:\nאין לשלב עם תכשירים אלקליים כדוגמת מרק קליפורני, מרק בורדו ושמנים.","c":"high"},"7458":{"t":"שילובים: אין לשלב דלפין בחומרים אחרים.","c":"high"},"1254":{"t":"שילובים: אין לשלב דלפין בחומרים אחרים.","c":"high"},"11029":{"t":"שילובים: אין לשלב דלפין בחומרים אחרים.","c":"high"},"4484":{"t":"שילובים: אין לשלב דלפין בתכשירים אחרים.","c":"high"},"90":{"t":"שילובים:\nדסיס ניתן לשילוב בתכשירי ההדברה הבאים:\nבירקות: לאנט 20, לאנט 90,\nאין לשלב בדסיס יותר מתכשיר אחד על פי הרשימה הנ\"ל.","c":"high"},"4581":{"t":"שילובים: אין לשלב דסיס אקספרט בתכשירים נוספים בגמר השימוש:","c":"high"},"1939":{"t":"שילובים: במלפפון ניתן לשלב עם: נז + שביט, מנקור, אקרובט, ספיידר, ולבון.","c":"high"},"1830":{"t":"שילובים: יש לשלב עם מרפאן 48 תר. 0.5%. אין לשלב עם תכשירים אחרים.","c":"high"},"154":{"t":"שילובים מותרים: ב- \"דקוגולד\" אפשר לשלב חומרי הדברה שונים כדי להגן על הפרי מפני ריקבונות בעת הדברה. גיב. תוספת תכשירים הנ\"ל מותנת באישורים לשימוש בהם, הן בארץ והן בארצות להן מיועד הפרי.","c":"high"},"4021":{"t":"שילובים:\nגזר: ניתן לשלב דקוטה 150 עם לימרקס 100.\nחימצה: ניתן לשלב דקוטה 150 עם בוראל 45 סמ\"ק/ד'.\nבטטה: ניתן לשלב דקוטה 125 עם קומנד 50 סמ\"ק/ד'.","c":"high"},"4153":{"t":"שילובים: ניתן לשלב דופלוזן KV","c":"high"},"1484":{"t":"גידולים וצוקבים: ניתן לגדל כותנה, חמניות, ענבניות וירקות בשדה 4 חודשים אחרי ריסוס בדרבי. תפוח אדמה, גזר, סלק קטניות ניתן לגדל 6 חודשים אחרי ריסוס בדרבי.","c":"high"},"1603":{"t":"שילובים: אסור השילוב עם תכשירים אחרים.","c":"high"},"776":{"t":"רשימת הצמחים בהם מומלץ השימוש בהורמוריל T-8: אלון, גיבסנית, הדרים, היביסקוס, ורד, זית, יסמין, לאוקדנדרון, ציפורן ושזיף.","c":"high"},"4388":{"t":"שילובים בתירס:\nאם ביום הריסוס החלקה משובצת בעשבים נדרש להוסיף שטח 90 0.1% לקטילת העשבים.\n(1) לריסוס פעם אחת בעונה נבדק ונמצא בטוח בזנים: רוויאלטי, אמיליייה, קולוסאוס, ג'אמבו, PANAN, אוריטה, קלגרי (לא נמצאו בישראל זנים רגישים לריסוס היט).\n(2) כאשר מרססים לפני הזריעה, מתוך כוונה להשתמש בגשמים להפעלת התכשירים.\n(3) ניתן לשלב אטרנקס במינון 80 סמ\"ק/ד' יחד עם פרונטייר אופטימה או היט, או שלושתם יחד.","c":"high"},"1407":{"t":"שילובים לחקלאות קונבנציונלית בלבד:\nניתן לשלב את התכשירים הרשומים להלן בהתאם למינונים המומלצים ולהוראות השימוש בתוויות התכשירים. אין לשלב עם תכשירים נוספים ללא ייעוץ גורם מוסמך.\nעגבניה - ורטימק, אטברון, מיתוס, מולי-טי, ביו-טי, סמש, פנגוס 25 ו-LQ-I.\nמלון - ורטימק, אטברון, אויסקט, מנציד, דיינון ו-LQ-I.\nפלפל - ורטימק, אטברון, מנציד, מוליס, מטאור.\nגזר - מנקודי, צ'מפיון.\nהדרים - אין לשלב את הליוגופרית עם שמן. אין לשלב עם תכשירים נוספים.\nגפן - ניתן לשלב עם טאקומי.","c":"high"},"4310":{"t":"שילובים: אסור לשלב עם תכשירים נוחשתים. בהעדר מידע נוסף, אין לשלב עם תכשירים נוספים.","c":"high"},"1848":{"t":"שילובים:\nברימון ניתן לשלב עם טלסטאר וראנר - בהתאם להוראות השימוש של התכשיר המשולב.","c":"high"},"4671":{"t":"שילובים: בהעדר מידע נוסף אין לשלב ואייגו עם תכשירים אחרים.","c":"high"},"4519":{"t":"שילובים: אין לשלב עם תכשירים נוספים.","c":"high"},"4148":{"t":"שילובים: ניתן לשלב ויוואנדו עם קומולוס ג\"ר באבטיח, גפן, מלון, דלעת, ודלורית. בקישוא ניתן לשלב ויוואנדו עם רידומיל גולד MZ ג\"ר, אקרובט ג\"ר, טלסטאר ת\"מ ואופיר ת\"ש.","c":"high"},"4502":{"t":"שילובים: אין לשלב ויטאווקס 2000 בתכשירים נוספים.","c":"high"},"1706":{"t":"שילובים: בתפוחי אדמה: ניתן לשלב ויטן + מנקו-די עם קונפידור או סקור. ניתן לשלב ויטן + אקרובט עם טריגרד או סקור. בעגבניות: ניתן לשלב ויטן + מנקו-די או ויטן + אקרובט או ויטן + בראבו עם טלסטאר.","c":"high"},"4170":{"t":"שילובים מותרים: יש לפעול לפי ההוראות הרשומות בתוויות. אין לשלב למעט השילובים הבאים:\nבתפוח - ניתן לשלב טאקומי ומרפאן 80.\nבגפן - ניתן לשלב אצטאסטאר בריכוז 0.25%.","c":"high"},"1139":{"t":"שילוב שמן וירותר עם תכשירי הדברה נוספים:\nניתן לשלב וירותר במיכל המרסס הגידולים המומלכים עם התכשירים טרייסר וספרטה סופר. יש להשתמש במינונים המומלצים בתווית תכשירים אלה","c":"high"},"1507":{"t":"שילובים:\nבמלפפון - ניתן לשלב ורטימק עם אופיר, רידומיל גולד MZ, נימגארד ואקרובט.\nבתות שדה - עם אופיר וסטרובי.\nבעגבניה - עם סקור ונימגארד.\nבפלפל - עם סקור ונימגארד.\nבהדרים - שמן לבנולה עד 2%.\nבהדרים שאינם נושאי פרי - אוריאה דלת ביורט 1.5%.\nבחציל, באבטיח ובמלון - עם פלינט ונימגארד.\n\nמניעת עמידות: אין לתת יותר מ-2 ריסוסי ורטימק בשנה בהדרים, בכותנה ואגסים. 3 ריסוסים בעגבניה, פלפל, חציל, מלפפון, מילון, אבטיח, תות שדה סלרי, בפרחים וצמחי נוי, ובשום אופן לא יותר מ-2 ריסוסים רצופים.","c":"high"},"4179":{"t":"שילובים:\nאין לשלב ורימרק בתכשירים נוספים.","c":"high"},"4496":{"t":"שילובים: אין לשלב את התכשיר עם חומרי הדברה אחרים למעט שמן אולטראפז כמצוין בהוראות השימוש.","c":"high"},"4617":{"t":"שילובים: בהעדר מידע, אין לשלב את התכשיר עם תכשירים אחרים.","c":"high"},"1718":{"t":"שילובים: כאשר משלבים יישום ורקוטל עם תכשירים אחרים, יש לעיין בתוויות התכשירים אלה ולנהוג לפיהן.","c":"high"},"4137":{"t":"שילובים: ניתן לשלב את התכשיר זאוס עם התכשירים הבאים, בכפוף לתוויות התכשיר המשולב:\n• ענבייה: ניתן לשילוב עם סוויץ' 0.06%.\n• גפן: ניתן לשילוב עם דיימונד 0.05%.","c":"high"},"4504":{"t":"שילובים: בתפוח אדמה: קורציית, סיגנום, סקור.\nעמידות: אין להשתמש בזורבק אנקנטיה ברציפות, אלא כחלק ממשטר טיפולים חלופיים עם קוטלי פטריות אחרים מקבוצות כימיות שונות המומלצים למטרה זו. אין ליישם זורבק אנקנטיה, יותר מ-2 יישומים בעונה.","c":"high"},"1430":{"t":"שילובים: אין לשלב עם תכשירים נוספים.","c":"high"},"1724":{"t":"שילובים: אין מידע","c":"high"},"1405":{"t":"שילובים: אין לשלב תכשיר חנטאון עם כל תכשיר, מרסס זב בעל סילון צר, לריכוז הרסס על התפרחת.","c":"high"},"1898":{"t":"שילובים: בחמצה ניתן לשלב עם סיגנום.","c":"high"},"4443":{"t":"שילובים:\nבחיטה: אטמי אקסטרה, אמינובר\nבעגבניות לתעשיה: מנקו די\nבמלון: קנון 50\nבכרוב: אטברון\nבפלפל: גופריתר\nבמלפפון: קנון 50, דנמארק, מנקו די","c":"high"},"4097":{"t":"שילובים:\nבגפן - ניתן לשלב טאקומי עם טאליוס, סיסטאן, אוריוס והליוגנופרית.\nבתפוח - ניתן לשלב טאקומי עם אורפאן.\nבענבנייה - ניתן לשלב טאקומי עם סימוקסיטוף.\nבתירס - ניתן לשלב טאקומי עם טולסטאר ומתומקס.\nבגזר - ניתן לשלב טאקומי עם עמיסטר וסיגנום.","c":"high"},"7393":{"t":"שילובים: אין לשלב טוב 0-15-0 עם כל תכשיר.","c":"high"},"11043":{"t":"שילובים: אין לשלב טוב 0-15-0 עם כל תכשיר.","c":"high"},"4387":{"t":"שילובים: בהעדר מידע נוסף, אין לשלב עם כשירים אחרים.","c":"high"},"4255":{"t":"שילובים במסטים: אין מידע\n\nגפן בזנים: קריניאן, פרנץ קולומברד, פטיט ורדו, חלואני, שרדונה על כנת פולסן, מרסלאן על כנת ריכטר, סופריון, גרנאש, מורלו.\nהדרים בזנים: ניו הול-טבורי, אדום, אור, שמוטי, ולנסיה, ראוסטנברג, אור, מיכל, לימון יוריקה.\nאבוקדו בזנים: הס, אטינגר, גליל מנגו בזנים: קיט, שלי, עומר.","c":"high"},"4736":{"t":"שילובים: אין לשלב עם תומרים המייצרים תגובת אלקלין, כולל תכשירים המכילים אלומינום, גופרית ליים (lime sulphur) ותרכובות בורד.","c":"high"},"1581":{"t":"שילובים: ניתן לשלב טומהוק עם ראונדאף / גלייפוגן במועד הטיפול המוזכרים בהוראות השימוש לגידולים בגד\"נ (ראה סעיף שילוב של טומהוק עם ראונדאף/גלייפוגן מגדיל את מספר הפקעים (סעידה).","c":"high"},"1966":{"t":"שילובים:\nניתן לשלב עם התכשירים הבאים (בכפוף לתוויות שלהם):\nאורורה ג.ר. , דרבי ת.ר. ודופלוזן ת.ב.","c":"high"},"13":{"t":"שילובים: באנגס, ניתן לשלב טופז עם רימון פאסט.","c":"high"},"1222":{"t":"שילובים: ניתן לשלב טופיק עם הבאים בלבד: אקספרס 75 ג\"ר, אמבר 75 ג\"ר, ברומוטריל 240 ת\"מ, דופלון 600 ת\"נ, יגאר ת\"מ ודרבי ת\"ר. בכל שילוב יש להתחשב גם בהוראות השימוש המופיעות בתוית החומר המשולב. בזן בית השיטה ניתן לשלב טופיק רק עם יגאר ת\"מ או ברומוטריל ת\"מ.","c":"high"},"4386":{"t":"שילובים:\nבהעדר מידע, אין לשלב עם תכשירים אחרים.","c":"high"},"4526":{"t":"שילובים: אין לשלב TOG-STAR בתכשירים אחרים.","c":"high"},"7334":{"t":"שילובים: אין לשלב טבעון עם כל תכשיר.","c":"high"},"7345":{"t":"שילובים: אין לשלב טיבעון פלוס עם כל תכשיר.","c":"high"},"428":{"t":"שילובים:\nבחיטה: אטמי אקסטרה, אמינובר\nבעגבניות לתעשיה: מנקו די\nבמלון: קנון 50\nבכרוב: אטברון\nבפלפל: גופריתר\nבמלפפון: קנון 50, דומארק, מנקו די","c":"high"},"1288":{"t":"שילובים במכל המרסס:\n1. מומלץ לשלב משטח טיבולין בריכוז 0.05% מנפח התרסיס בתירס מספוא ובתפוח אדמה.\n2. ניתן לשלב אטרנקס או תירסיד בטיטוס על פי הוראות השימוש בתירס מספוא.\n3. אין לשלב טיטוס בתכשירים נוספים.\n\nגידולים הבאים במחזור: טיטוס אינו מהווה סיכון לגידולים עוקבים במחזור, בתנאי שהשטח נחרש או תוחח ונפרק הזמן בין מועד היישום לבין תחילת הגידול העוקב הוא ארוך מ-3 חודשים.","c":"high"},"1155":{"t":"שילובים:\nלא מומלץ לשלב יותר מ- 2 תכשירים מחשש לפגיעה.\n1.כותנה – ניתן לשלב עם סמס, אטרבון וזמוליט.\n2.בפרחים, משתלות וצמחי עציץ – רצוי לשלב טייגר עם אחד מקוטלי הגבורים הבאים: סמס, קרטה – וזאת לפי תכשירים המורשים בגידול. בגברה ניתן לשלב עם ורטימק. לפני הריסוס בשילובים אחרים יש לבדוק בטיחות השילוב תחילה על מספר מוצמצם של צמחים.","c":"high"},"1872":{"t":"שילובים: ניתן לשלב עם דרכי ת.ת. ועם המכיל תרמיטר ת.מ.","c":"high"},"1793":{"t":"שילובים: בתפוח ניתן לשילוב עם קרזו 0.015%.","c":"high"},"1624":{"t":"שילובים: בחציל (זנים: קלאסיק, מרגריטה, 1726) ניתן לשלב עם התכשירים אוברון 240 ת.ר. או מובנטו 100 ת.ר. יש להשתמש בתוארות המשולבת על פי הוראות השימוש שבתוויות התכשיר המשולב. השילובים נבדקו רק בן שצויין, יש לבחון את השילוב בזנים אחרים לפני ריסוס מסחרי. בהעדר מידע נוסף אין לשלב תכשיר זה עם תכשירים אחרים.","c":"high"},"1907":{"t":"שילובים: בגפן - טליוס נבדק ונמצא בטוח לשילוב עם אוואנט.","c":"high"},"917":{"t":"שילובים:\nניתן לשלב טלסטר עם החומרים הבאים לפי הוראות של החומר המשולב.\nחציל - אברון, ורטימק, אופיר, סיסטאן, מנקוזן.\nעגבניות - אברון, ורטימק, מנקוזן, באיפידן, אופיר, מוליט.\nפלפל - פיראט, אטמי אקסטרה, מסאי, פרוקלים, אוונטו, ורטימק, נימגרד, מוסקוביל, באיפידן, פולאר.\nמלון - ורטימק, מנקוזן, דומארק, קומבי, קנון.\nתפו\"א - מנקו-די, ספוטוויין.\nגפן - דומארק, דומארק קומבי, קנון, סטרובי, פוליקור, פלינט, סיסטאן, אופיר.\nאפרסק - אטמי אקסטרה, דומארק קומבי.\nחימצה - קנון, בראבו.\nחיטה - פריורי אקסטרה.","c":"high"},"4165":{"t":"שילובים: בהעדר מידע נוסף אין לשלב עם תכשירים אחרים.","c":"high"},"1036":{"t":"שילובים:\nבגידולי שדה בטיפול קדם הצצה אפשר לשלב טרבוטרקס להדברת עשבים הגבוהים מ-5 ס\"מ עם ראונדאפ, רגלון או גלייפוגן, ובנפח התרסיס המפורטים בתוויות אלה. אולם במקרה של שילוב עם רגלון יש להכניסו למרסס במינונים ובנפח התרסיס המפורטים בתוויות אלה ולרסס בנפח תרסיס של לא פחות מ-20 ל/ד' לפחות. ניתן לשלב עם ראונדאפ או גלייפוגן בנפח תרסיס של 20 ל/ד' רק בגמר המילוי ולרסס בנפח תרסיס של לא פחות מ-20 ל/ד' לפחות.","c":"high"},"4314":{"t":"שילובים:\nבגידולי שדה בטיפול קדם הצצה אפשר לשלב טרבולי להדברת עשבים הגבוהים מ-5 ס\"מ עם ראונדאף / גל\"יפוגן, רגלון במינונים ובנפח התרסיס המפורסים בתוויות בתוויות של התכשיר המשולב, אולם במקרה של שילוב עם רגלון יש להכניסו לכל המרסס במילוי ולרסס במנפח תרסיס של 20 ל\"/ד לפחות. ניתן לשלב עם ראונדאף או גל\"יפוגן בסוף המילוי.","c":"high"},"7329":{"t":"שילובים : לגבי שילובים עם תכשירים אחרים יש להתייעץ עם החברה המשווקת.","c":"high"},"4054":{"t":"שילובים: בחרצית ניתן לשלב טרופר עם ברא-בו וספיידר בתוויות שלהם.\nבגמר השימוש:\nניקוי המרסס: בגמר הריסוס יש לרוקן את המיכל מהשאריות בהתאם להנחיות לסילוק תשטיפים. אחר כך יש לשטוף את המרסס את המים ולחלקיו במים ודטרגנט  התכשירים המפורטים בטבלת הוראות השימוש.","c":"high"},"1037":{"t":"שילובים: כדי להרחיב את מגוון העשבים הנקטלים ולפנות בעשביה קיימת, ניתן לשלב כותוגן עם דיארוקס. בכל מקרה של שילוב יש להכניס למכל קודם את הכותוגן, אחר כך את התכשיר המשולב ולבסוף את המים. ניתן לשלב עם רגלון אך יש להכניסו למכל המרסס רק במגמר מילוי המים ולרסס בנפח תרסיס של 20 ליטר/דונם לפחות.","c":"high"},"767":{"t":"שים לב: אסור להוסיף לתרחיפים המכילים כל-פיקס חומרי רטיבות, משטחים או חומרי הדבקה אחרים.","c":"high"},"1860":{"t":"שילובים: בתפוח אדמה ובענביה ניתן לשלב כרמל עם התאם למועדי הטיפול.","c":"high"},"4129":{"t":"שילובים: בתפוח אדמה ובעגבניה ניתן לשלב כרמל עם התאם לתועיד בתווית טיטוס.","c":"high"},"4273":{"t":"שילובים (זנים: פופקורן -618 , ריואלטי) מותר לשלב עם מאצו 50 ת.ש..\nתירס (זנים: 618, לאונור ואוויטה) מותר לשלב עם דורגים 32.5 ת.ש.מ..\nיש להשתמש בתוארית המשולבת על פי הוראות השימוש שבתוויות התכשיר המשולב.\nהשילובים נבדקו רק בזן שציון, יש לבחון את השילוב בזנים אחרים לפני ריסוס מסחרי.\nבהעדר מידע נוסף אין לשלב תכשיר זה עם תכשירים אחרים.\nגידולים עוקבים: ניתן לזרוע תכשיר כגידול עוקב ללא מגבלת זמן וחיטה תיזרע 5 חודשים לאחר מועד יישום התכשיר לאודיס. בהעדר מידע נוסף, אין לזרוע גידולים עוקבים אחרים.\nעמידות: תתכן התפתחות עמידות מקומית של עשבים כנגד כל תכשיר קוטל עשבים עם הזמן. במקומות כאמור יש להפקיד ולנקוט באמצעים המכוונים להתמודד עם בעיית העמידות ובדפי ההדרכה. בכל מקרה שיש לקיומם של מיני עשבים שפיתחו או סבילות כאמור, יש להשתמש בקוטלי עשבים אחרים במקום מתכשיר זה.","c":"high"},"1947":{"t":"שילובים: אין מידע","c":"high"},"4278":{"t":"שילובים: בהעדר מידע נוסף אין לשלב תכשיר זה בתכשירים נוספים.","c":"high"},"1934":{"t":"שילובים בהדרים: ניתן לשלב שמן בריכוז של 0.5%, כתוספת לתכשירי אבמקטין (ביומקטין).\nשילובים באפרסמון: ניתן לשלב שמן לגונה בריכוז של 0.5%, כתוספת לתכשיר אטלס.\nבהדרים: אין לרסס כלל שמן בריכוז גבוה (0.5% ומעלה) לפני או אחרי ריסוס בתכשירי סיהקסטין (אל-חלד או הדר) וגופרית באותה עונת פרי. ניתן לרסס שמן בריכוז 0.5% במרווח של חודש ימים לפחות לפני או אחרי ריסוס בתכשירים אל-חלד או הדר ותכשירי גופרית.","c":"high"},"1893":{"t":"שילובים במטסים: להרחבת ההדברה ניתן לשלב עם גליגן. בכל מקרה שיש שילוב גם בהנחיות השימוש והבטיחות המפורטים בתווית התכשיר המשולב. לשיפור הדברת עשבית קיימת, יש לשלב ראונדאף / גלייפוגן. יש להכניסם לתוך המיכל מלוי המרסס לאחר השלמת מילוי המרסס.\n\nחיטה\nשילובים בחיטה: השימוש בלגטו בתוך בדרך כלל בשילוב עם אחד מהתכשירים הבאים, על מנת להרחיב מגוון העשבים המודברים: ברומוטריל, אלבור סופר. אין לשלב לגטו עם תכשירים אחרים. ניתן לשלב לגטו עם אלבור סופר, רק עד שבועיים לפני הגעת החיטה לגיל הדגל, לפי הפמוקד מביניהם. לאחר שילוב עם אלבור סופר, אין להקפיד על ניקוי על נגלי הריסוס פסולת הרעילה ברמת חובב. מהשירותים להגנת הצומח יהיו בתנוית התכשירים המשולבים.\nריסוס אוויר: אין לפזר תכשיר מכלי טיס –\n1.מעל בית או במרחק של 120 מטר ממנו\n2.מעל דרך או במרחק של 12 מטר ממנו\n3.כאשר הרוח נושבת מכיוון השטח המיועד לריסוס לכיוון בית או דרך כיוון הרוח יבדק לפני הריסוס ובמהלכו על ידי אבוקות עשן דולקת בשטח.\n\nבצל\n*אין להשתמש בתכשיר בחציל הירוק המיועד לשיווק להסיר הלבנה הסימני הלבנה על הלבנה של העלים.","c":"high"},"4265":{"t":"שילובים: בתפוח (זנים: סטארקינג, זהוב וריאול-גלאקסי) ניתן לשלבו עם התכשיר: מרפאן 50 א.ר.. יש להשתמש בתוארית המשולבת על פי הוראות השימוש שבתווית התכשיר המשולב. השילובים נבדקו רק בזן שציין, יש לבחון את השילוב בזנים אחרים לפני ריסוס מסחרי. בהעדר מידע נוסף אין לשלב תכשיר זה עם תכשירים אחרים.","c":"high"},"4380":{"t":"שילובים: אין לשלב תכשיר זה עם תכשירים אחרים.","c":"high"},"4591":{"t":"שילובים: בהעדר מידע נוסף אין לשלב תכשיר זה עם תכשירים אחרים (כולל חומרי הזנה).","c":"high"},"1627":{"t":"שילובים: אין מידע.","c":"high"},"1119":{"t":"שילובים: בטיפול לפני הצצת הגידול ניתן לשלב עם רגלון. במקרה של שילוב של שלוב עם רגלון נפח התרסיס צריך להיות 20 ל'/ד' לפחות. יש להוסיף את התכשירים המשולבים בסוף מילוי המרסס במים.","c":"high"},"4105":{"t":"שילובים:\nבהחלטה קים מתן לשרות את מתן השקיה עד חלף 48 שעות ממועד הריסוס.\n\nאזהרה:\nאין לרסס בתנאי מזג אוויר קיצוניים (שרב, קרה) או כשהגידול במצב של עקה (יובש, עודפי מים, פגיעה מקטולי עשבים וכו').","c":"high"},"4030":{"t":"שילובים מ כשיר זה עם תכשירים אחרים.\n\nבהדרים (זנים: סן רייז, אורה, נובה, ניו הול, אשכולית אדומה, לימון, אור, אורה, פומלית, טופז, וולנסיה - ניתן לשלבו עם התכשיר דורסן.\nזנים – סן פומלאו, אשכולית לבנה, אשכולית אדומה, לימון, אור, אורה, פומלית, טופז, וולנסיה - ניתן לשלבו עם התכשיר שם JMS.\n\nכרוב (זנים: פרוקטור) ניתן לשלבו עם התכשיר: מאאץ 50 ת.ש.\n\nבאטטיה (זנים: 616) ניתן לשלב עם התכשיר נתיבו 75% גר., (זנים: מקימה) ניתן לשלב עם התכשיר ביסקיה 240 ת.ש.מ.\n\nמלון (זנים: גלון, מירון, יריב (ניב)) ניתן לשלב עם התכשיר ביסקיה 240 ת.ש.מ.\n\nבקישוא (זנים: קוריסט, טופזיו, שורוק) ניתן לשלב עם התכשיר: שמן קייצי JMS. (זנים: קוריסט וטופזיו) ניתן לשלב עם התכשיר: ביסקיה 240 ת.ש.מ.\n\nבחציל (זנים: קלאסיק, מרגריטה,1726) ניתן לשלב עם התכשיר: תלדור 500 ת.ר..\n\nבעגבניה (זנים: טרה קוטה, שרי תמר, ניקוס, ברונו ומוזה) ניתן לשלב עם התכשיר: ביסקיה 240 ת.ש.מ.\n\nיש להשתמש בתוארית המשולבת על פי הוראות השימוש שבתוויות התכשיר המשולב.\nהשילובים נבדקו רק בזן שציון, יש לבחון את השילוב בזנים אחרים לפני ריסוס מסחרי.\nבהעדר מידע נוסף אין לשלב תכשיר זה עם תכשירים אחרים.","c":"high"},"971":{"t":"שילובים: בכל מקרה של שילוב עם תכשיר נוסף יש להכניס את מוליט כתכשיר ראשון למיכל המרסס.\nבירקות - ניתן לשלב מוליט עם רידומיל גולד MZ, סימבוש.\nבכותנה - ניתן לשלב עם סקור, לאנט 36 ת\"מ, טייגר ת\"מ, דורסן, באיטרואיד.\nבפרחים - ניתן לשלב מוליט עם אורון, אופיר וסקור ת\"מ.\nבגפן - ניתן לשלבו עם סיסטאן, אופיר, אורון וביפידאן.\nבתירס - אפשר לשלבו עם לאנטו.\nבתפוח ובאגס - ניתן לשילוב עם אופיר, מרפאן ופלינט ג\"ר.\nבכל מקרה של שילוב יש להתחשב גם בהנחיות השימוש והזהירות המפורטות בתוויות החומר המשולב!","c":"high"},"1672":{"t":"שילובים בעגבנייה: ניתן לשלב מוניטור באחד מטיפולי המוניטור עם סיטוס להרחבת תווי העשבים המודברים (בגידול זה מינימום משקעים לאחר הריסוס מוניטור – 450 מ\"מ).","c":"high"},"967":{"t":"שילובים: אין לשלב עם מרק בורדו, מרק קליפורני, תכשיר נחושת או קוטלי אקריות. לפני כל שילוב יש לבדוק לבטיחות על מספר קטן של צמחים.","c":"high"},"1835":{"t":"שילובים: פירוט השילובים הבטוחים עם מוספילן בגידולים השונים\nלפני כל ריסוס בדוק לבטיחות על מספר מצומצם של צמחים.\n\nהגידול | שילובים אפשריים\nאבטיח | סיגנום, סטרובי\nקישוא | סיגנום\nמלפפון | ספיידר\nשמם | סיגנום, סטרובי\nמלון | סיגנום\nפלפל | סיגנום\nחציל | סיגנום\nעגבניה | ספיידר, סיגנום\nהדרים | חנקת אשלגן, גופרית מנגנז, אורית מנגן, חנקת סידן, אוריה (ריכוז נמוך) (לפי המלצות קסם הארז)\nענב | סיגנום\nקטן | סיגנום, טיטאן, אטברון, פיקס\nריחן, נענע, מרווה, זעתר, אקליל הר, טרכון, כוסברה, שמיר, בקדנוס, ג'רג'יר | סיגנום","c":"high"},"1125":{"t":"שילובים: בכל מקרה של שילוב יש לפעול בכפוף להוראות התווית של התכשיר המשולב:\nשילובים מומלצים להדברת אקריות בירקות:\nבענבנייה, פלפל, חציל, מלפפון, אבטיח - מומלץ לשלב מטאור 100 סמ\"ק/ד' עם אינוורט 50 סמ\"ק/ד', או אפולו 40 סמ\"ק/ד', או נימגארד בריכוז 1%.\nשילובים נוספים מותרים עם קוטלי מחלות ומזיקים בירקות:\nבענבנייה - ניתן לשלב עם אסטברון ת.מ, אנטורקול א.ר, מנציידן א.ר, סיסטאן ת.מ, סמש ת.מ, קרטה ת.מ, רסק ת.ר.\nבפלפל - ניתן לשלב עם אסטברון ת.מ, אפלורד ת.ר, מנציידן א.ר, סיסטאן ת.מ, סמש ת.מ, קרטה ת.מ.\n\nמטעים:\n\nשילובים: בכל מקרה של שילוב יש לפעול בכפוף להוראות התווית של התכשיר המשולב:\nשילובים מומלצים להדברת אקריות במטע:\nבתפוח עץ - מומלץ לשלב מטאור בריכוז 0.1% עם EOS בריכוז 1%, או אפולו בריכוז 0.04%.\nבאגס - מומלץ לשלב מטאור בריכוז 0.1% עם קורמורן בריכוז 0.075%, או EOS בריכוז 0.075%.\nבהדרים - מומלץ לשלב מטאור בריכוז 0.1% עם EOS בריכוז 1%, או עם אינוורט בריכוז 0.06%.\nשילובים נוספים מותרים במטעים עם קוטלי מחלות ומזיקים:\nבאגס - ניתן לשלב עם מרפאן א.ר.\nבתפוח - ניתן לשלב עם מרפאן א.ר, או סיסטאן ת.מ, או אפלורד ת.ר.\nבאפרסק - ניתן לשלב עם מרפאן א.ר, או סיסטאן ת.מ, או אפלורד ת.ר.\nבנקטרינה - ניתן לשלב עם סיסטאן ת.מ, או אפלורד ת.ר.\nבגפן - ניתן לשלב עם אפלורד ת.ר.\nהדרים - ניתן לשלב עם אפלורד ת.ר.\n\nפרחים:\n\nשילובים: בכל מקרה של שילוב יש לפעול בכפוף להוראות התווית של התכשיר המשולב.\nהשילובים המותרים בפרחים עם קוטלי מחלות ומזיקים:\nבורד - ניתן לשלב עם אפלורד ת.ר, או מוליט ת.ר.\nבשילוב מטאור עם משטח, אין לשלב תכשיר נוסף.","c":"high"},"4419":{"t":"שילובים: בכל שילוב, יש לפעול בהתאם לתוויות התכשיר המשולב.","c":"high"},"4086":{"t":"שילובים:\n• בתפוח אדמה ניתן לשלב עם לירון או עם לינורקס.\n• בעגבניה, ניתן לשלב עם טיטוס במינון 5 גרם לדונם.\nבכל שילוב יש לפעול בהתאם להוראות התוויית של התכשיר המשולב.","c":"high"},"4409":{"t":"שילובים:\nבכרוב: אמפליגו, אטברון, טיטאן, מוספילון, מץ', פרוקליים.\nבעגבניה: אמפליגו, דומארק, גופריתר, קוצייד, סקוטר, דיפנדר, פלורומייט.\nבפלפל: מובנטו, ספרטה סופר, אוברון, רופאסט, טרייסר אולטרא.\nבבזיל: ניתן לשלב עם ורטימק וקנון.\nבאבטיח: ניתן לשלב עם זיווארנד.\nבוורדים: ניתן לשלב עם טרייסר אולטרא.\nבמלפפון: ניתן לשלב עם אגרירון.","c":"high"},"4422":{"t":"שילובים: בהעדר מידע, אין לשלב עם תכשיר אחרים.","c":"high"},"4258":{"t":"שילובים: אין לשלב מייטווט עם תכשירים אחרים","c":"high"},"1535":{"t":"שילובים: בירקות ניתן לשלב עם ספיידר לפי הרישיון הרישיון של התכשיר המשולב.","c":"high"},"4592":{"t":"שילובים: אין לשלב עם תכשירים אחרים.","c":"high"},"7490":{"t":"שילובים: אין לשלב עם חומרי הדברה או דשנים אחרים.","c":"high"},"7152":{"t":"שילובים: בהעדר מידע, אין לשלב מיקרוטיול עם תכשירים אחרים.","c":"high"},"1610":{"t":"שילובים: בהעדר מידע, אין לשלב מיקרוטיול עם תכשירים אחרים.","c":"high"},"1846":{"t":"שילובים מותרים: ניתן לשלב מיראזי 45 עם הליוגופריית במנגו בחקלאות קונבנציונלית בלבד.","c":"high"},"4058":{"t":"שילובים מותרים:\nבפלפל, ניתן לשלב מירדור עם EOS.\nבתפו\"א ניתן לשלב עם אודאון ומנציידן.\nבגפן, ניתן לשלב להדברת כשותית מירדור.","c":"high"},"4107":{"t":"שילובים:\n• בתירס נגד לפיגמה רצוי לשלב עם שמן ויירול 1%","c":"high"},"1259":{"t":"שילובים:\nניתן לשלב מנקו-ד' עם התכשירים הבאים, בהתאם למינונים המופיעים בתווית של כל תכשיר:\n1. ענבניות - ורטימק, מטאור, טיטאן, טלסטאר, סיסטאן, אופיר, קווייד.\n2. חציל - אדמי אקסטרה, טלסטאר, אפלוד.\n3. מלפפון - ורטימק, מטאור, טיטאן, טלסטאר, סיסטאן, אופיר.\n4. תפוחי אדמה - ויטון, טלסטאר.\n5. שעועית - אנסבראון, מוליס, חוגר.\n6. שקד - מאברייק.\n7. גפן - סיסטאן.\n8. ורד - ורטימק.","c":"high"},"766":{"t":"שילובים: אין לשלב מנקוטל בתכשירים נוספים.","c":"high"},"1413":{"t":"שילובים: בתפוח ניתן לשלב מסאי-מייט עם מוליט ת\"ר, מצ' ת\"מ, אופיר 2000 ת\"ש. בשאר הגידולים ניתן לשלב עם אופיר ת\"מ בלבד.","c":"high"},"1313":{"t":"שילובים:\nבכותנה - ניתן לשלב מץ' עם מוספילן א\"מ, פגסוס ת\"נ, אפלורד ת\"ר, טייגר ת\"מ, סקור ת\"מ ועם מוליט ת\"ר.\nבירקות - ניתן לשלב מץ' עם אפלורד ת\"ר, סקור ת\"ר, ת\"מ, ביפידאן ת\"מ, אופיר ת\"ש, מוליט ת\"ר א\"מ, רידומיל גולד MZ ג\"ר וזוויץ' ג\"ר.\nבפרחים - ניתן לשלב מץ' עם אפלורד ת\"ר, טריגרד א\"ר, קרטה ת\"מ, ועם מוליט ת\"ר.\nבתפוח - ניתן לשלב מץ' עם אופיר ת\"ש ועם מסאי א\"ר.\nבכל מקרה של שילוב, יש להתחשב גם בהנחיות השימוש ואמצעי הזהירות המפורטים בתווית של החומר המשולב!","c":"high"},"4295":{"t":"שילובים: בהעדר מידע נוסף אין לשלב עם תכשירים אחרים.","c":"high"},"618":{"t":"שילובים: באחסון, ניתן לשלב מרפאן 48 על פי סעיף הערות בטבלת השימוש.","c":"high"},"7344":{"t":"שילובים: בנגר הכלאות יש לרוקן את הבנק מהשאריות לנחיית לסילוק תשטיפים. אחר כך יש לשטוף את המרכס ולמלק בו תשטיפים. סילוק תשטיפים: יש לרוקן ולשטוף הכשירים או שאריות ממתקן מקובלות, מפיל אסיוף או ממתקן אחר אל הקרקע, אל בריכות דנים ואל מקורות וזיקוי הים למינייהם. יש לסלק השטיפים בשיטות מאושרות על ידי המשרד להגנת הסביבה, כגון: ריסוס בשטח קלאי, שימוש חוזר, טיהור, אידוי ופינוי לאתר הפסולת הרעילה. אין לשלב עם קוונטאנאלית בלבד, ניתן לשלב עם תכשירים אחרים.","c":"high"},"1140":{"t":"שילובים: שילוב יתבצע רק לפי הוראות התוויות של התכשיר המשולב, ורק בזנים ובחומרים המופיעים מטה: בתירס, ניתן לשלב מתומקס 90 עם טאקומי.","c":"high"},"4311":{"t":"שילובים: בהעדר מידע נוסף אין לשלב תכשיר זה עם תכשירים נוספים.","c":"high"},"4027":{"t":"שילובים: אין לשלב עם קוטלי חרקים אחרים.","c":"high"},"7448":{"t":"שילובים: אין לשלב עם קוטלי חרקים אחרים.","c":"high"},"4416":{"t":"שילובים: שילוב בתכשירי נחושת עלול לפגום בפעילות הפיתיון. יתרה מכן, עיילות הפיתיון עלולה להיפגע כאשר הוא מרוסס על רקע טיפול קודם בתכשירי נחושת.","c":"high"},"979":{"t":"שילובים: אין להשתמש בנוגל ברציפות, אלא כחלק ממשטר טיפולים חלופיים עם קוטלי פטריות אחרים מקבוצות כימיות שונות המולקלציים למחלה זו. המרווח בין הריסוסים 7–14 ימים.","c":"high"},"5360":{"t":"שילובים: אין לשלב נוקס בתכשירים נוספים.","c":"high"},"4134":{"t":"שילובים:\nחקלאות קונבנציונאלית: באגס ניתן לשלב עם סטרנר. בתפוח אדמה ניתן לשלב עם נימגארד.\nחקלאות אורגנית: ניתן לשלב עם נימגארד בתפוח אדמה.","c":"high"},"1391":{"t":"שילובים מותרים בחקלאות אורגנית:\nניתן לשלב נימגארד עם קוואייד ובלושילד.\nבכל שילוב יש לפעול בכפוף להוראות התכשיר המשולב. אין לשלב עם תכשירים נוספים.\n\nשילובים מותרים בחקלאות קונבנציונלית:\nבמלון ואבטיח: ניתן לשלב נימגארד עם אורטימק וז'דינון.\nבגזר ותפו\"א: ניתן לשלב עם קוואייד ובלושילד.\nבכל שילוב יש לפעול בכפוף להוראות התכשיר המשולב. אין לשלב עם תכשירים נוספים.","c":"high"},"4683":{"t":"שילובים: בעגבנייה ניתן לשלב עם פליפר בריכוז 0.5%.","c":"high"},"7566":{"t":"שילובים: בעגבניה ניתן לשלב עם פליפר בריכוז 0.5%.","c":"high"},"1802":{"t":"שילובים: נימטול נבדק ונמצא בטוח לשילוב עם התכשירים הבאים: באנטיס ובמלפפון – ורקוט. בענבייה ובתפוח אדמה – קוצ'יד 2000.","c":"high"},"7376":{"t":"שילובים: נימטול נבדק ונמצא בטוח לשילוב עם התכשירים הבאים: בענבייה ובתפוח אדמה – קוצי 2000.","c":"high"},"4247":{"t":"שילובים: אין לשלב נימיץ עם חומרים נוספים.","c":"high"},"11020":{"t":"שילובים:\nאין לשלב שילובים שאינם מופיעים בתווית. יש לקרוא בעיון את התוויות של המאושרות בשילובים –\nניתן לשלב את הנימיקס 45 עם זוהר LQ-215 לסיטוח ולשיפור ההדברה.","c":"high"},"1449":{"t":"שילובים: ניתן לשלב נימיקס 45 עם זוהר LQ-215 לשיטות ולשיפור ההדברה.","c":"high"},"7538":{"t":"שילובים מותרים: אין לשלב את התכשיר הנמטודות עם קוטלי מיקים אחרים.","c":"high"},"4349":{"t":"שילובים מותרים: אין לשלב את התכשיר הנמטודות עם קוטלי מיקים אחרים.","c":"high"},"7537":{"t":"שילובים מותרים: אין לשלב את התכשיר הנמטודות עם קוטלי אחרים.","c":"high"},"4350":{"t":"שילובים מותרים: אין לשלב את התכשיר הנמטודות עם קוטלי אחרים.","c":"high"},"4338":{"t":"שילובים: בהעדר מידע נוסף, אין לשלב תכשיר זה עם תכשירים אחרים.","c":"high"},"312":{"t":"שילובים: בתפוח עץ, ניתן לשלב נמרוד עם אורפאן.","c":"high"},"9069":{"t":"שילובים: בתפוח עץ, ניתן לשלב נמרוד עם אורפאן.","c":"high"},"1836":{"t":"שילובים:\nניתן לשלב נץ+שביט עם מוספילן באבטיח.\nלמניעת התפתחות תנגודת לנץ, יש לשלב בכל טיפול שביט, במינון המורשה לגידול.\nלפני ריסוס בכל שילוב אחר, בדוק את פיתוחתו על מספר מצומצם של צמחים.","c":"high"},"4503":{"t":"שילובים: אין לשלב נקסטר 10 בתכשירים אחרים.","c":"high"},"1953":{"t":"שילובים:\nבבעל (זנים: מיקה, אדום ואורלנדו 686) ניתן לשלב עם התכשיר מוכנסו 100 ת.ר.\nבאבטיח (זנים: 616) ניתן לשלב עם התכשיר מוכנסו 100 ת.ר.\nזנים: 616: הרי - אדום, מלי, וקלאוניק - ניתן לשלב עם התכשיר אוברון 240 ת.ר.\nבפלח (זנים: רד גלוב, סנוריור, קריניאן, SBS) ניתן לשלב עם התכשיר מוכנסו 100 ת.ר.\nיש להשתמש בתוצאות המשולבות על פי הוראות השימוש שבחוויות התכשיר המשולב.\nהשילובים בדקו רק בזן שצוין. יש לזלף את השילוב בזנים אחרים זנים אחרים ריסוס מסחרי.\nבהעדר מידע נוסף אין לשלב תכשיר זה עם תכשירים אחרים.","c":"high"},"4069":{"t":"להדברת נבטי עשבים קיימים אפשר לשלב סאנדורון עם ראונדאפ במינונים המומלצים. להדברת נבטי עשבים קיימים יש לשלב סאנדורון עם משטח DX בריכוז 0.5%.","c":"high"},"1431":{"t":"שילובים: ניתן לשלב סוויץ' עם אופיר ת\"ש, ורטימק ת\"מ, סקור ת\"מ, רידומיל גולד MZ א\"ר ועם אקרובט א\"ר. בגפן ניתן לשלב סוויץ' עם דורסט, דור און ת\"מ, טיסאן ת\"מ ועם רידומיל MZ ג\"ר. בכל מקרה של שילוב עם חומר נוסף יש להמיס תחילה את סוויץ' ורק אח\"כ את החומר הנוסף.","c":"high"},"9029":{"t":"שילובים:\nניתן לשלב סוויץ' עם אופיר וד\"ש, ורטימק וד\"ש, סקלור וד\"ש, רידומיל גולד MZ אי\"ר ועם אקרובט אי\"ר. בגפן ניתן לשלב עם סוויץ' עם שלבו של דורון, דור אן וד\"ש, סיסאן וד\"ש ועם רידומיל MZ בגפן. בכל מקרה של שילוב עם חומר נוסף יש להמשיך להשתמש בהוראות תחילת התמיסה של סוויץ' ורק אחר כך להוסיף את החומר הנוסף.","c":"high"},"4673":{"t":"שילובים: יישום בשילוב פייטון ג.ר, במינון 50 ג'/ד' ישפר את פעילות מנועת הצצת העשבים כגון: חלמית, סביון הערבות, ויפגע בחיזוניות מיני ירבוז שיציץ.","c":"high"},"1808":{"t":"שילובים: אין מידע","c":"high"},"7520":{"t":"שילובים מותרים:\nאין לשלב עם חומרים נוספים.","c":"high"},"4535":{"t":"שילובים: ניתן לשלב עם קופרופורס בהדרים ובגפן.\nניתן לשלב עם אזו בהדרים גפן וגזר.\nאין לשלב עם שמנים או עם תכשירים בתואריות המכילות שמנים.\nבגמר השימוש","c":"high"},"7511":{"t":"שילובים: ניתן לשלב עם קופרופורס בהדרים ובגפן.\nניתן לשלב עם אזו בהדרים גפן וגזר.\nאין לשלב עם שמנים או עם תכשירים בתואריות המכילות שמנים.\nבגמר השימוש","c":"high"},"4487":{"t":"שילובים: בהעדר מידע נוסף, אין לשלב את התכשיר עם תכשירים אחרים.","c":"high"},"4252":{"t":"שילובים: אין מידע על שילובים.","c":"high"},"7505":{"t":"שילובים: אין מידע על שילובים.","c":"high"},"1807":{"t":"שילובים: אין לשלב עם תכשירים נוספים.","c":"high"},"4554":{"t":"שילובים: אין לשלב עם תכשירים נוספים.\nגידולים עוקבים במחזור: כותנה, תנה, בצל, גזר.","c":"high"},"1544":{"t":"שילובים: מומלץ לשלב משטח לא יוני.\n\nאין לשלב סטייפל עם קוטלי דגניים בריריים. שילוב זה עלול לגרום בהדברת דגני הבר. כמו כן אין לרסס סטייפל בסמיכות לריסוס בקוטלי הדגניים. אלא להמתין 7 ימים בין טיפול אחד לטיפול האחר.","c":"high"},"4336":{"t":"שילובים: אין לשלב סטייפל עם קוטלי דגניים בררניים. שילוב זה עלול לפגום בהדברת דגני הבר. כמו כן אין לרסס סטייפל בסמיכות לריסוס בקוטלי הדגניים. אלא להמתין 7 ימים בין טיפול אחד לטיפול האחר.","c":"high"},"1406":{"t":"שילובים: במלפפון - ניתן לשלב עם פולירם DF. באבטיח - ניתן לשלב עם מוליט. לפני ריסוס בכל שילוב לבדוק את בטיחותו על מספר מצומצם של צמחים.","c":"high"},"1349":{"t":"שילובים: ניתן לשלב סטרייק עם ראונדאפ ועם מוני עצים כגון דיאורקס 80 ת.ר. בכל השילובים הנ\"ל נהג לפני הוראות ואמצעי הזהירות המופיעים בתווית כל תכשיר.","c":"high"},"1549":{"t":"שילובים: ניתן לשלב את סטרן עם מוצרי הטיפול המוכרים לעיל, כפוף לרישויים בגידולים אלה. השילוב עם סטרן מאנדאמף מחסר את הגורם גומא הפעיל.","c":"high"},"1831":{"t":"שילובים: במועד השילוח הראשון ניתן לשלב סטרפטיז ת.ר. עם קוויק, בכותנה שאינה מיועדת לגידול זרעים.","c":"high"},"32":{"t":"שילובים בחיטה: סי. סי. סי. ניתן במקרה הצורך לערבב עם תכשירים שונים השימושיים בחיטה, עם דשנים כגון: אוריאה וחנקת אמון נוזלי, ועם קוטלי עשבים שונים כגון: אלבר-מ, אלבר סופר, ברומוטריל. בשילוב עם דשנים וקוטלי עשבים יש להקפיד על העיתוי המתאים: כך למשל אפשר לשלב עם ברומוטריל סמוך להנחיות תמתאימות, אך עם אלבר-מ, אלבר סופר אפשר לשלב רק בשלב ההפרקה.","c":"high"},"4499":{"t":"שילובים: בהעדר מידע נוסף ים: אקספרס, דופלוזן KV.\nלהדברת עשבים דגניים ניתן לשלב עם טופ-גן.\n\nאזהרה: בירקות אין לשלב פאלקון עם קוטלי דגניים. יש לשמור על פער של 72 שעות בין ריסוס קוטלי דגניים לריסוס פאלקון.\n\nגידולים שאפשר לגדל במחזור לאחר גידול שטופל בפאלקון: חיטה, תמניות, כותנה, עגבניות ותירס בלבד.\nאין לגדל אבטיח או דלועים אחרים לפחות 12 חודשים אחרי יישום התכשיר ובלבד שהשטח נחרש והושקה ב- 300 מ\"מ מים לפחות.","c":"high"},"4331":{"t":"שילובים: בהעדר מידע, אין לשלב עם תכשירים אחרים.","c":"high"},"4149":{"t":"שילובים: בהעדר מידע מיידי אין לשלב עם תכשירים אחרים.","c":"high"},"4477":{"t":"שילובים:\nבהדרים ניתן לשלב במשטח טיבולין.","c":"high"},"1871":{"t":"שילובים: בהעדר מידע נוסף אין לשלב את התכשיר עם תכשירים אחרים.","c":"high"},"4628":{"t":"שילובים: אין לשלב עם תכשירים נוספים.","c":"high"},"4401":{"t":"שילובים: בהעדר מידע נוסף אין לשלב עם תכשירים אחרים.","c":"high"},"4285":{"t":"שילובים: אין לשלב פוינטר 500 בתכשירים נוספים.","c":"high"},"4413":{"t":"שילובים: בחיטה ובאגוזי אדמה - אין לשלב פול-סוינג בתכשירים נוספים. בחימצה ניתן לשלב פול-סוינג עם באלאנס סמארט.","c":"high"},"1236":{"t":"שילובים: פולאר נמצא בטוח לשימוש, בתנאים בהם נבדק, בשילוב עם התכשירים הבאים: תות שדה - נמרוד, דומארק, קולים.","c":"high"},"4629":{"t":"שילובים:\nבתפוח אדמה ובעגבנייה: התכשיר פוליו גולד ניתן לשילוב במיכל המרסס עם קורצייט כמפורט מתחת לטבלה. המירווות בין הריסוסים במעוקבות עם תכשירים אחרים יהיה כ-7-10 ימים בהתאם לעוצמת הנגיעות ולתנאים המטאורולוגיים המתאימים להתפתחות המחלה.","c":"high"},"4248":{"t":"שילובים: בהעדר מידע נוסף, אין לשלב עם תכשירים אחרים.","c":"high"},"1040":{"t":"שילובים: ניתן לשלב את פוליקור 250 ת.מ. עם אחד מן התכשירים הבאים: מונבוטו 100 ת.ר. (זנים: קרניאן, SBS), מורפאן, רודומיל, מנציין. בתפו\"א: עם אפלורד, מנציין, מנקור. יש להשתמש בתואריות המשלובת על פי הוראות השימוש שבתוויות התכשיר המשולב. בהעדר מידע נוסף אין לשלב תכשיר זה עם תכשירים אחרים.","c":"high"},"1839":{"t":"שילובים: בגפן ניתן לשלב פוליר ון ת\"מ עם אוונט ת\"ר.","c":"high"},"496":{"t":"שילובים: אין לשלב פולירם עם שום תכשיר אחר.","c":"high"},"1868":{"t":"שילובים: ניתן לשלב פולסאר ת\"מ במינון 60 סמ\"ק/ד' עם בזגראן ת\"מ במינון 70 סמ\"ק/ד' לשיפור הדברת עשבים ממספי המורכבים (גדיל, ברקן ואחרים) בגידולים בהם מורשה בזגראן (אפונה, בקיה שדות ותלתן).","c":"high"},"1285":{"t":"שילובים: אין לשלב עם תכשירים נופסים.","c":"high"},"1340":{"t":"שילובים: אין לשלב עם תכשירים נוספים.","c":"high"},"7069":{"t":"שילובים: בהעדר מידע, אין לשלב פונגוראן 50 עם תכשירי הדברה אחרים.","c":"high"},"1148":{"t":"שילובים: בהעדר מידע נוסף, אין לשלב פונגוראן 50 עם תכשירי הדברה אחרים.","c":"high"},"1118":{"t":"שילובים: ניתן לשלב פוקוס אולטרא עם אלבר סופר רק באותם הגידולים בהם תכשירים אלה מורשים לשימוש. במקרים אלה הקפד על תנאי השימוש המפורטים בתוויות של תכשירים אלה.","c":"high"},"7525":{"t":"שילובים מותרים:\nאין לשלב עם חומרים נוספים.","c":"high"},"4346":{"t":"שילובים: באין כל מידע אחר, אין לשלב תכשיר זה עם חומר אחר.","c":"high"},"4042":{"t":"סכנות לשביבה: התכשיר אינו רעיל לדבורים. התכשיר רעיל ליצורים חיים במים. התכשיר בעל פוטנציאל להיתם מי תהום, מני רעיל ונספג ועלול להיות או מי השטיפה למערכת הביוב, מקורות מים, נחלים, מאגרים, לברכות דגים ושדות מעובדים. אין לרסס קווי עשבים זה באזור שפלת החוף, כמפורט להלן: א. מגבולות הצפוני של רצועת עזה עד אשדוד, בחלקות המנצאות עד 3 ק\"מ מהים, ב) מאשדוד עד קיסריה, בחלקות המנצאות עד 8 ק\"מ מקו הים, ג) מחיפה-קריות עד עכו, בחלקות המנצאות עד 3 ק\"מ מקו הים. לא לכלכלות באיסור זה חלקות בהן שיעור החרסית הוא 15% ויותר, או תכולת החומר האורגני בקרקע היא 1% ויותר. הוראות שימוש: אין לרסס שטחים בקרב, לפני ל לשלב פטרה עם משטח או תכשיר אחר פרט לבנט. במספר איזורים התלגו עשבים עמידים לתכשירים מעכבי ALS. אין לרסס פטרה בשדות אלה.","c":"high"},"4050":{"t":"שילובים מותרים: \"פילאבסטר 400\" ניתן לשלב עם תכשירים לטיפול בפרי לאחר קטיף: טקטו. השימוש בפיליבסטר ובחומרים הנ\"ל מותנה באישורים לשימוש בהם, הן בארץ והן בארצות לגן מיועד הפרי.","c":"high"},"438":{"t":"שילובים: פיקס ניתן לשילוב עם מוספילן, טייגר, פולירם DF או סיגנום.\nלפני כל ריסוס בכל שילוב אחר בדוק לבטיחות על מספר צמצומש של צמחים.","c":"high"},"1303":{"t":"שילובים:\nניתן לשלב עם התכשירים הבאים, בהתאם למינונים המופיעים בתוית הארזיה שלהם:\n1. פלפל - גופרית, שביט, הליאופריט, טלסטאר, אטברון, סמש.\n2. מלפפון - דמארק, קנון.\n3. עגבניה - אטומי אקסטרורה, בראבו, דאקוניל, מנקו די, פוליקור, מיתוס, דורסט, טיטאן, אטברון, טלסטאר, קומודור, אואנט, איפון, פולאר, פרוקלים.","c":"high"},"1341":{"t":"שילובים: אין לשלב עם תכשירים נוספים.","c":"high"},"701":{"t":"שילובים: אין מידע","c":"high"},"1987":{"t":"שילובים: (השילובים מתייחסים לטבלה 2). במטיפים ניתן לשלב טייפון (בכפוף לתוויות התכשיר): במועדי הטיפול המוזכרים בהוראות השימוש, כפוף לרישוי בגידולים הנ\"ל.","c":"high"},"4231":{"t":"שילובים: אין לשלב בתכשירים המכילים נחושת או עופרת.","c":"high"},"4028":{"t":"שילובים: בהעדר מידע, אין לשלב פלדין ת.מ. עם תכשירים נוספים.","c":"high"},"4286":{"t":"שילובים: בהעדר מידע אין לשלב את התכשיר עם תכשירים אחרים.","c":"high"},"1640":{"t":"שילובים: בהיעדר מידע נוסף אין לשלב תכשיר זה עם תכשירים אחרים. במקרה זה אין לשלב תכשיר זה עם תכשירים אחרים, יש ליצור קשר עם חברתנו לפני השילוב.\nשזיף: קליפסו 480 ת.ר.; עגבנייה: טלדור 500 ת.ר.; קופרו-אנטרקול 52.5% א.ר.;\nבצל: מסורול 500 ת.ר.; קופרו-אנטרקול 52.5% א.ר.;\nשום: קופרו-אנטרקול 52.5% א.ר.","c":"high"},"4540":{"t":"אין לשלב את התכשיר עם תכשירי קנון או עם תכשירים המכילים נחושת או עם תכשירי גופרית.\n\nהפצת אויבים טבעיים צריכה להיעשות לאחר שהצמחייה המרוססת התייבשה מהתרסיס.","c":"high"},"1415":{"t":"שילובים: בהעדר מידע, אין לשלב פליקטרן עם תכשירים אחרים.","c":"high"},"4609":{"t":"שילובים: בתפוח, באפרסק, בנקטרינה יש לשלב באקסירל.","c":"high"},"4639":{"t":"שילובים: אין לשלב עם תכשירים נוספים.","c":"high"},"965":{"t":"שילובים: אין לשלב עם חומרים נוספים.","c":"high"},"4543":{"t":"שילובים: ניתן לשלב את התכשיר עם התכשירים- דופלוזן KV, טיפטופ, ברומיתר.","c":"high"},"4022":{"t":"שילובים:\nבכותנה ניתן לשלב עם התכשירים אטלס, סקיפר וטולדו בהתאם ובכפוף לרשום בתוויות התכשירים המשולבים.","c":"high"},"4264":{"t":"שילובים: ניתן לשלב עם בנזט 40 – 50 סמ\"ק/ד'.\nאזהרות: אין לרסס על עשבים גבוהים או משתרעים יותר מ5 ס\"מ. אין לרסס כשהגידול בעקה. אין לרסס בעת רוח. יש להזהר לבל יפגע ריח התרסיס בגידולים שכנים. בגידולי קטניות לאכול, עלול לחול עיכוב של מספר ימים בהבשלת התרמילים.","c":"high"},"4497":{"t":"שילובים: אין לשלב עם קוטלי חרקים אחרים.","c":"high"},"4274":{"t":"שילובים מותרים: בכל שילוב יש לפעול לתוויות התכשיר המשולב.\nבענבנייה ובמלפפון, ניתן לשלב את התכשיר עם התכשיר טופז במינון 100 ג'/ד'.\nאין לשלב עם תכשירים אחרים לא מורשים.","c":"high"},"7518":{"t":"שילובים מותרים:\nאין לשלב עם חומרים נוספים.","c":"high"},"4108":{"t":"שילובים: בחימצה ניתן לשלב עם החומרים הבאים (בכפוף לתווית החומר המשולב): טרבוטרקס, בוראל, רייסר, טייפון.","c":"high"},"1038":{"t":"שילובים: ניתן לשלב עם תכשיר רגלון. השילוב מתאפשר רק לפני הצצת הגידול. רצוי לרסס על עשבים קטנים על-מנת שכיסוי פני הקרקע על ידי תכשיר הפרומטרקס יהיה מיטבי. הכנס לפני מכל קודם את הפרומטרקס ולאחר מכן את התכשיר המשולב.","c":"high"},"1986":{"t":"שילובים: ניתן לשלב פרונטייר אופטימה ת\"ר בריסוס קדם הצצה בלבד.\n\nשילובים בתפוח-אדמה: ניתן לשלב את התכשיר עם פייטון גר. במינון של 50 גרם לדונם, אך ורק בזנים המורשים לריסוס. בשילוב הנ\"ל אין לרסס אחרי התחלת הצצה של תפוח האדמה. בקרקעות קלות בלבד. בתירס - ניתן לשלב הית 10 גר\"ד 1/או אטרנקס 80 סמ\"ק/ד, כמו כן ניתן לרסס את שלושת התכשירים יחידי. אם ביום הריסוס החלקה משובשת בעשבים, ומשלבים בריסוס שטף פלאט 0.1%.\n\nשילובים: אין לבצע שילובים.\n\nשילובים: אין לשלב עם תכשירים אחרים. יתכן והריסוס יגרום לנזק קל של עלי הבטטה, העלים החדשים הפרוסים ביום הריסוס, הנזק קטן ולא ילוה לנזק קוב לדונם. אין ליישם יותר מפעם אחת בעונה. מורשה לייישום באזור השרון בלבד. לקבלת הדברה מירבית של כל הנתון כלל המינה לפי התפתחות הבטטה. ריסוס מאוחר יפחית את יעילות ההדברה.\n\nשילובים: אין לשלב עם תכשירים אחרים. יש להציג את התכשיר במינון של 20 קוב לפחות מיום מריסוס. לקבלת הדברה מירבית של הסעידה יש לרסס מוקדם בהתאם לגיל הבצל, ריסוס מאוחר יפחית את יעילות ההדברה.","c":"high"},"1508":{"t":"שילובים: ניתן לשלב פרוקליים ת\"מ עם אופיר 2000 ת\"ש ורידומיל גולד MZ ג\"ר בעגבנייה, ורד וגפסנית.","c":"high"},"1908":{"t":"שילובים: פריורי אקסטרה המיושם בריסוס ניתן לשלב עם התכשירים הבאים, בהתאם למ
